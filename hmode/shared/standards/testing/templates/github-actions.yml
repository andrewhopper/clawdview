# GitHub Actions Test Workflow
# File UUID: 3b5c7d9e-2f4a-6b8c-0d1e-3f5a7b9c1d2e
#
# Copy to: .github/workflows/test.yml
#
# Required repository variables (Settings > Secrets and variables > Actions > Variables):
#   - TEST_COVERAGE_THRESHOLD (optional, default: 70)
#   - PRODUCTION_URL (required for smoke tests)
#
# Required secrets (for deployment smoke tests):
#   - None required for basic testing

name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_smoke:
        description: 'Run smoke tests'
        required: false
        default: 'false'
        type: boolean

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # All test configuration is parameterized
  TEST_COVERAGE_THRESHOLD: ${{ vars.TEST_COVERAGE_THRESHOLD || '70' }}
  TEST_TIMEOUT: ${{ vars.TEST_TIMEOUT || '30000' }}
  TEST_RETRIES: ${{ vars.TEST_RETRIES || '2' }}
  TEST_FAIL_FAST: ${{ vars.TEST_FAIL_FAST || 'true' }}
  TEST_REPORT_DIR: './test-reports'
  CI: true

jobs:
  # ==========================================================================
  # LINT JOB
  # ==========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: make lint

  # ==========================================================================
  # UNIT TEST JOB
  # ==========================================================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: make test-coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ env.TEST_REPORT_DIR }}/coverage
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: ${{ env.TEST_REPORT_DIR }}/junit.xml
          retention-days: 7

  # ==========================================================================
  # E2E TEST JOB
  # ==========================================================================
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: make test-e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ${{ env.TEST_REPORT_DIR }}/playwright
          retention-days: 7

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7

  # ==========================================================================
  # SMOKE TEST JOB (only on main branch or manual trigger)
  # ==========================================================================
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test-unit, test-e2e]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_smoke == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: make test-smoke
        env:
          TEST_BASE_URL: ${{ vars.PRODUCTION_URL }}
          EXPECTED_GIT_HASH: ${{ github.sha }}

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: ${{ env.TEST_REPORT_DIR }}/smoke
          retention-days: 7

  # ==========================================================================
  # STATUS CHECK (combines all test results)
  # ==========================================================================
  test-status:
    name: Test Status
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-e2e]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint failed"
            exit 1
          fi
          if [ "${{ needs.test-unit.result }}" != "success" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.test-e2e.result }}" != "success" ]; then
            echo "E2E tests failed"
            exit 1
          fi
          echo "All tests passed!"
