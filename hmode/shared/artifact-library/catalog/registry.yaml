# -----------------------------------------
# DETECTION CONFIG
# -----------------------------------------
detection:
  # Patterns that trigger artifact detection
  trigger_patterns:
    - "make a/an {X}"
    - "create a/an {X}"
    - "write a/an {X}"
    - "generate a/an {X}"
    - "draft a/an {X}"
    - "I need a/an {X}"
    - "help me write a/an {X}"
    - "can you create a/an {X}"
    - "prepare a/an {X}"
    - "put together a/an {X}"

  # Confidence thresholds
  thresholds:
    auto_suggest: 0.9      # Automatically suggest template
    ask_user: 0.7          # Ask if user wants template
    ignore: 0.7            # Below this, don't suggest

  # Words to strip before matching
  stop_words:
    - quick
    - simple
    - short
    - detailed
    - comprehensive
    - rough
    - draft
    - formal
    - informal
