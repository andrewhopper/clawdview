  personal-context:
    status: development
    version: "1.0.0"
    description: Personal context management - source of truth for user state, location, activity, and preferences for AI personalization
    owner: platform
    dependencies: [core]
    entities: [UserContext, LocationContext, Coordinates, NamedLocation, BoundingBox, ActivityContext, StateContext, BipolarDimensions, UnipolarDimensions, BipolarValue, UnipolarValue, EnvironmentContext, UserPreferences, SchedulePreferences, TimeWindow, DietaryPreferences, MealSchedule, ActivityPreferences, ContextSnapshot]
    actions: [CaptureContext, GetCurrentContext, UpdateLocation, UpdateActivity, UpdateStateDimension, CreateNamedLocation, UpdatePreferences]
    enums: [LocationLabel, MotionState, ActivityType, FocusLevel, NoiseLevel, SocialContext, DietaryRestriction, DietType, SocialPreference, DayOfWeek, ContextSource]
    features:
      - GPS coordinates with semantic labels
      - Named locations with bounding box geofencing
      - Motion state detection (stationary/walking/running/driving)
      - Bipolar state dimensions (-5 to +5) for energy, mood, stress, social battery
      - Unipolar state dimensions (1-5) for hunger, alertness, focus, cognitive load, comfort
      - Activity tracking with focus level
      - Schedule, dietary, and activity preferences
      - Context history storage (captured but not analyzed)
    use_case: AI personalization layer - productivity tools, meal planning, focus apps, smart home

  personal-capability:
    status: development
    version: "1.0.0"
    description: Personal capability management - time, money, skills, and constraints for better AI recommendations
    owner: platform
    dependencies: [core]
    entities: [UserCapabilities, TimeCapability, TimeBlock, MoneyCapability, BudgetRange, SkillsCapability, SkillArea, ConstraintsCapability, Constraint, Blocker]
    actions: [CaptureCapabilities, GetCurrentCapabilities, UpdateTimeCapability, UpdateMoneyCapability, AddSkill, AddConstraint, RemoveConstraint]
    enums: [BusyLevel, FlexibilityLevel, TimeOfDayPreference, PressureLevel, TimeQuality, BudgetLevel, BudgetPeriod, ComfortLevel, SpendingPriority, SkillCategory, ProficiencyLevel, LearningCapacity, LearningStyle, ConstraintType, BlockerCategory, SeverityLevel, RiskTolerance]
    features:
      - Time availability (hours, blocks, busy level, flexibility)
      - Financial capability (budget ranges, comfort level, spending priority)
      - Skills inventory with proficiency levels
      - Constraint and blocker tracking with severity
      - Simple capture for AI decision-making
    use_case: AI planning layer - task scoping, learning recommendations, project planning, delegation decisions
    related:
      - personal-context: "Momentary state vs stable capabilities"
      - personal-values: "What matters vs what's possible"
      - personal-priorities: "What to focus on vs what's achievable"

  verification:
    status: production
    version: "1.0.0"
    description: Project verification with atomic Eval primitives
    owner: platform
    dependencies: [core]
    entities: [Eval, PatternEval, ExistsEval, FieldEval, ContainsEval, CompoundEval, ConditionalEval, Rule, EvalResult, RuleResult, Report]
    actions: [Evaluate, CheckRule, Verify]
    enums: [EvalTarget, ExistsKind, LogicOperator, RuleCategory, Severity, TechStack, Grade]
    consumers: [frontgate, overwatch, manual, ci]
    features:
      - Atomic Eval primitive (true/false)
      - Rule = Eval + metadata
      - Composable with CompoundEval (AND/OR)
      - ConditionalEval for if-then logic
    theme_reference: "https://asset-distribution-bucket-1762910336.s3.us-east-1.amazonaws.com/previews/night-sky-theme.html"

  project:
    path: project/project.yaml
    description: "Project metadata and references"

  investor:
    status: production
    version: "1.0.0"
    description: Angel investors, VCs, accelerators - profiles, thesis, check sizes, portfolio tracking
    owner: platform
    dependencies: [core, organization]
    entities: [Investor, InvestmentFirm, InvestmentThesis, InvestorContact, PortfolioCompany, AcceleratorProgram, InvestorActivity]
    actions: [SearchInvestors, RefreshInvestorData, GenerateInvestorReport, TrackActivityTrends]
    enums: [InvestorType, FirmType, InvestorStatus, InvestmentStage, SectorFocus, GeographicFocus, ContactType, InvestmentOutcome, ActivityLevel, ConfidenceLevel]
    data_storage: data/investor-db/
    features:
      - Living database with periodic refresh
      - JSON per object storage
      - Indexed by sector, stage, geography, check size
      - Trend tracking over time
    use_case: Fundraising research, investor CRM, trend dashboards

  food-beverage:
    status: draft
    version: "1.0.0"
    description: Food and beverage menu items with customization support
    owner: platform
    dependencies: [core, product]
    entities: [MenuItem, MenuCategory, ModifierGroup, Modifier, Size, NutritionalInfo, Recipe, RecipeStep, RecipeIngredient, TimeRange]
    enums: [MenuItemType, SelectionType, Allergen, DietaryTag, DayOfWeek, CategoryStatus, RecipeComplexity]
    features:
      - Multi-level modifier groups (milk, syrup, size, shots)
      - Nutritional information with allergen tracking
      - Size-based pricing and calorie scaling
      - Time-based availability (breakfast, lunch, all-day)
      - Recipe with preparation steps
    use_case: Restaurant ordering, cafe POS, food delivery apps

  order:
    status: draft
    version: "1.0.0"
    description: Cart and order management with fulfillment tracking
    owner: platform
    dependencies: [core, auth, product, finance]
    entities: [Cart, CartItem, Order, OrderItem, FulfillmentDetails, OrderStatusHistory, SelectedModifier]
    enums: [PaymentStatus, FulfillmentStatus, FulfillmentType, StatusType]
    features:
      - Ephemeral cart with expiration
      - Dual-state tracking (payment + fulfillment)
      - Denormalized order items for history preservation
      - Multiple fulfillment types (pickup, delivery, dine-in, curbside, drive-thru)
      - Order status audit trail
      - Special instructions and modifiers
    use_case: E-commerce checkout, restaurant ordering, food delivery
