  # ============================================
  # HUMAN-LLM INTERACTION DOMAIN SUITE
  # 12 composable domains for modeling LLM interactions
  # Created: 2025-11-23
  # Sources: Anthropic, OpenAI, Microsoft, arXiv research
  # ============================================

  llm-participant:
    status: production
    version: "1.0.0"
    description: Actor types in LLM interactions - humans, assistants, agents, systems
    owner: platform
    dependencies: [core]
    entities: [Participant, HumanParticipant, AssistantParticipant, AgentParticipant, SystemParticipant, UserPreferences, ParticipantSession]
    enums: [ParticipantType, AgentType, AutonomyLevel, SystemSource, SessionRole, VerbosityLevel]
    sources: [RAISE paper, Open Message Format, Anthropic/OpenAI APIs]

  llm-model:
    status: production
    version: "1.0.0"
    description: LLM model definitions, capabilities, pricing, and provider configurations
    owner: platform
    dependencies: [core]
    entities: [Model, Provider, ModelPricing, RateLimits, ModelBenchmark, ModelComparison, ModelEndpoint]
    enums: [ProviderType, ModelFamily, ModelCapability, Modality, TaskCategory, AuthMethod, DeploymentType, HealthStatus]
    sources: [OpenAI, Anthropic, AWS Bedrock, RouteLLM]

  llm-message:
