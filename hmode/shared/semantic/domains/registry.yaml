    actions: [CreateTask, SubmitDecision, DeferTask, GetQueue, AssignReviewer, ComputeAggregateDecision, CreateReviewQueue, PullFromQueue, CreateReviewCase, GetCaseProgress]
    enums: [TaskStatus, ReminderStatus, BundleType, BundleStatus, QueueType, QueueStatus, PriorityStrategy, CaseType, CaseStatus, ReviewerRole, AssignmentStatus, ApprovalPatternType, TieBreakerStrategy, RecommendationStrength, ScaleType, DependencyType, ImpactType, ImpactSeverity, ActorType, Modality, AuditEventType]
    use_case: Human-in-the-loop review for RLHF training data, clinical notes, architecture approvals, and content moderation

  human-tool:
    status: production
    version: "1.0.0"
    description: Real-time wire protocol for AI ↔ Human communication via IoT Core MQTT
    owner: platform
    dependencies: [primitive-tool, human-task, approval-queue]
    entities: [HumanToolInvocation, Stimulus, Option, Scale, Response, HumanToolBundle]
    enums: [StimulusType, ResponseType, InvocationStatus]
    serialization:
      format: xml
      examples: ["<human-tool id='' modality='' status=''><stimulus><question/></stimulus><response/></human-tool>"]
    mapping:
      to_human_task:
        HumanToolInvocation: Task
        Stimulus: TaskInput
        Response: TaskDecision
        HumanToolBundle: TaskBundle
      to_approval_queue:
        binary: Binary
        single_choice: Classification
        multi_choice: MultiLabel
        slider: Rating
        comparison: Comparison
        ranking: Ranking
        text_input: Freeform
    implementation:
      transport: "AWS IoT Core MQTT WebSockets"
      form_server: "Lambda Function URL"
      storage: "DynamoDB with 1-hour TTL"
      auth: "SigV4 for MQTT, IAM for Lambda"
    use_case: Claude Code /ask-human skill, human-in-the-loop approval forms, RLHF data collection

  approval-queue:
    status: production
    version: "1.1.0"
    description: Priority queue for human-in-the-loop approvals with AI confidence, auto-approval rules, batch operations, and 7 review types
    owner: platform
    extends: human-task
    dependencies: [human-task, core, notification]
    entities:
      # Core
      - ApprovalItem
      - Confidence
      - Alternative
      - Priority
      - PriorityFactor
      - Decision
      - FeedbackSignal
      - ApprovalRule
      - RuleCondition
      - BatchGroup
      - Source
      # Content types
      - DataModelField
      - CodeChange
      - EmailDraft
      - AIGeneration
      # Review config
      - ReviewConfig
      - UIHints
      # Review type entities
      - Category
      - ScaleLabel
      - ComparisonOption
      - RankableItem
      - ItemRank
      - Label
      - LabelGroup
      - LabelConfidence
      - TextDiff
      - DiffSegment
    actions: [GetPriorityQueue, SubmitDecision, BatchApprove, BatchByCriteria, EvaluateAutoApproval]
    enums:
      # Core
      - ItemType
      - ItemStatus
      - ConfidenceLevel
      - Action
      - FeedbackType
      - Modality
      - ConditionOperator
      - BatchCriteria
      # Review types
      - ReviewTypeName
      - BinaryChoice
      - RatingScaleType
      - ComparisonType
      - PreferenceStrength
      - FreeformInputType
    review_types:
      - name: Binary
        description: Simple yes/no or approve/reject
        gestures: [swipe_right, swipe_left, tap]
      - name: Classification
        description: Select one category from predefined set
        gestures: [tap, long_press]
      - name: Rating
        description: Rate on scale (stars, thumbs, -5 to +5)
        gestures: [swipe_horizontal, tap_star]
      - name: Comparison
        description: A/B preference selection (RLHF)
        gestures: [tap_left, tap_right, swipe_up, swipe_down]
      - name: Ranking
        description: Order items by preference
        gestures: [drag, tap_number]
      - name: Freeform
        description: Text input for corrections/annotations
        gestures: [tap, voice, swipe_up]
      - name: MultiLabel
        description: Select multiple tags/labels
        gestures: [tap, long_press, double_tap]
    features:
      - AI confidence with alternatives and recommendations
      - Auto-approval rules with condition matching
      - Priority calculation (urgency, age, confidence_inverse, blocking, deadline)
      - Batch operations by ID or criteria
      - Type-specific content schemas (data model, code, email, AI generation)
      - 7 review types (binary, classification, rating, comparison, ranking, freeform, multi-label)
      - Gesture mappings per review type
      - Voice input support
      - UI hints for layout and feedback
    use_case: Data model field review, code review, RLHF feedback, email draft approval, document approvals, image labeling, content moderation
    authority_pattern:
      description: ATC-style delegated authority with boundaries and check-ins
      entities:
        - Clearance
        - FlightPlan
        - FlightLeg
        - LegConstraint
        - AllowedAction
        - CumulativeLimit
        - Scope
        - DeviationTolerance
        - CheckInTrigger
        - AutonomySchedule
        - TimeRule
        - ContextRule
        - ActionLog
        - CheckInResult
      enums:
        - ClearanceStatus
        - AutonomyLevel
        - TriggerType
        - ContextType
        - Severity
        - DayOfWeek
      actions:
        - GrantClearance
        - RevokeClearance
        - AdjustAutonomy
        - CheckInRequest
        - EvaluateAction
      autonomy_levels:
        - full_auto: "AI acts without check-in (sleeping/unavailable)"
        - high_autonomy: "AI acts, notifies after (busy)"
        - supervised: "AI acts, human can intervene (available)"
        - assisted: "AI suggests, human decides (focused review)"
        - manual: "Human does everything, AI only observes"

