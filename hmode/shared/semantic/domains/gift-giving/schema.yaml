      - email         # Email
      - sms           # Text message
      - mail          # Physical card
      - video         # Video message

  ThankYouStatus:
    values:
      - draft
      - scheduled
      - sent
      - delivered
      - viewed
      - failed

# ============================================
# ACTIONS
# ============================================

actions:

  # Gift CRUD
  CreateGift:
    description: Create a new gift record
    parameters:
      title: { type: string, required: true }
      recipientId: { type: string, required: true }
      occasionId: { type: uuid }
      estimatedPrice: { type: Money }
      purchaseUrl: { type: uri }
    result: Gift
    permission: gift:create
    idempotent: false

  UpdateGiftStatus:
    description: Update gift status through lifecycle
    parameters:
      giftId: { type: uuid, required: true }
      status: { type: GiftStatus, required: true }
      notes: { type: string }
    result: Gift
    permission: gift:update
    idempotent: true

  RecordGiftDelivery:
    description: Mark gift as delivered
    parameters:
      giftId: { type: uuid, required: true }
      deliveredAt: { type: datetime }
      trackingNumber: { type: string }
      proofImageUrl: { type: uri }
    result: Gift
    permission: gift:update

  # Wishlist CRUD
  CreateWishlist:
    description: Create a new wishlist
    parameters:
      name: { type: string, required: true }
      visibility: { type: WishlistVisibility }
      occasionId: { type: uuid }
    result: Wishlist
    permission: wishlist:create

  AddWishlistItem:
    description: Add item to wishlist
    parameters:
      wishlistId: { type: uuid, required: true }
      title: { type: string, required: true }
      url: { type: uri }
      price: { type: Money }
      priority: { type: Priority }
      notes: { type: string }
    result: WishlistItem
    permission: wishlist:update

  ClaimWishlistItem:
    description: Claim an item (hidden from owner)
    parameters:
      itemId: { type: uuid, required: true }
      claimerId: { type: string, required: true }
    result: WishlistItem
    permission: wishlist:claim
    errors: [ALREADY_CLAIMED, SELF_CLAIM, ITEM_NOT_FOUND]

  UnclaimWishlistItem:
    description: Release claim on item
    parameters:
      itemId: { type: uuid, required: true }
      claimerId: { type: string, required: true }
    result: WishlistItem
    permission: wishlist:claim
    idempotent: true

  # Occasion management
  CreateOccasion:
    description: Create a new occasion for a person
    parameters:
      personId: { type: string, required: true }
      type: { type: OccasionType, required: true }
      date: { type: date, required: true }
      isRecurring: { type: boolean, default: true }
      reminderDays: { type: array, items: integer }
    result: Occasion
    permission: occasion:create

  SyncOccasionToCalendar:
    description: Sync occasion to calendar app
    parameters:
      occasionId: { type: uuid, required: true }
      calendarId: { type: uuid }
    result: Occasion
    permission: occasion:update

  # Group gifts
  CreateGroupGift:
    description: Start a new group gift
    parameters:
      title: { type: string, required: true }
      recipientId: { type: string, required: true }
      targetAmount: { type: Money, required: true }
      deadline: { type: datetime }
      giftUrl: { type: uri }
    result: GroupGift
    permission: group_gift:create

  ContributeToGroupGift:
    description: Make contribution to group gift
    parameters:
      groupGiftId: { type: uuid, required: true }
      amount: { type: Money, required: true }
      message: { type: string }
      isAnonymous: { type: boolean }
    result: GroupGiftContribution
    permission: group_gift:contribute

  InviteToGroupGift:
    description: Invite someone to contribute
    parameters:
      groupGiftId: { type: uuid, required: true }
      inviteeEmail: { type: string }
      inviteePhone: { type: string }
      message: { type: string }
    result: GroupGiftInvitation
    permission: group_gift:invite

  # Gift exchanges
  CreateGiftExchange:
    description: Create a new gift exchange
    parameters:
      name: { type: string, required: true }
      type: { type: ExchangeType, required: true }
      exchangeDate: { type: date, required: true }
      minBudget: { type: Money }
      maxBudget: { type: Money }
    result: GiftExchange
    permission: exchange:create

  JoinGiftExchange:
    description: Join a gift exchange
    parameters:
      exchangeId: { type: uuid, required: true }
      wishlistId: { type: uuid }
      giftPreferences: { type: string }
      exclusions: { type: array, items: string }
    result: ExchangeParticipant
    permission: exchange:join

  DrawExchangeMatches:
    description: Run matching algorithm
    parameters:
      exchangeId: { type: uuid, required: true }
    result: GiftExchange
    permission: exchange:manage
    errors: [NOT_ENOUGH_PARTICIPANTS, MATCHING_IMPOSSIBLE]

  RevealExchangeMatch:
    description: Reveal match assignment to participant
    parameters:
      participantId: { type: uuid, required: true }
    result: ExchangeParticipant
    permission: exchange:view_match

  # Gift ideas
  SaveGiftIdea:
    description: Save a gift idea
    parameters:
      title: { type: string, required: true }
      forRecipientId: { type: uuid }
      forOccasionType: { type: OccasionType }
      url: { type: uri }
      price: { type: Money }
      category: { type: GiftCategory }
      source: { type: IdeaSource, default: manual }
    result: GiftIdea
    permission: idea:create

  GetGiftRecommendations:
    description: Request AI gift recommendations
    parameters:
      recipientId: { type: uuid }
      occasionType: { type: OccasionType }
      priceMin: { type: Money }
      priceMax: { type: Money }
      categories: { type: array, items: GiftCategory }
    result: GiftRecommendationRequest
    permission: idea:recommend

  ConvertIdeaToGift:
    description: Convert saved idea to actual gift
    parameters:
      ideaId: { type: uuid, required: true }
      recipientId: { type: string, required: true }
      occasionId: { type: uuid }
    result: Gift
    permission: gift:create

  # Thank you notes
  SendThankYouNote:
    description: Send thank you for a gift
    parameters:
      giftId: { type: uuid, required: true }
      message: { type: string, required: true }
      deliveryMethod: { type: ThankYouDeliveryMethod }
      imageUrls: { type: array, items: uri }
    result: ThankYouNote
    permission: thank_you:send

# ============================================
# RELATIONSHIPS
# ============================================

relationships:

  - type: one_to_many
    from: GiftRecipient
    to: Gift
    foreign_key: recipientId
    description: A recipient receives many gifts

  - type: one_to_many
    from: GiftRecipient
    to: Occasion
    foreign_key: personId
    description: A recipient has many occasions

  - type: one_to_many
    from: Wishlist
    to: WishlistItem
    foreign_key: wishlistId
    description: A wishlist contains many items

  - type: one_to_many
    from: Occasion
    to: Gift
    foreign_key: occasionId
    description: An occasion has many gifts

  - type: one_to_many
    from: Occasion
    to: OccasionReminder
    foreign_key: occasionId
    description: An occasion has many reminders

  - type: one_to_many
    from: GroupGift
    to: GroupGiftContribution
    foreign_key: groupGiftId
    description: A group gift has many contributions

  - type: one_to_many
    from: GroupGift
    to: GroupGiftInvitation
    foreign_key: groupGiftId
    description: A group gift has many invitations

  - type: one_to_many
    from: GiftExchange
    to: ExchangeParticipant
    foreign_key: exchangeId
    description: An exchange has many participants

  - type: one_to_one
    from: Gift
    to: ThankYouNote
    foreign_key: giftId
    description: A gift may have one thank you note

  # Cross-domain relationships
  - type: one_to_one
    from: Occasion
    to: calendar:Event
    foreign_key: calendarEventId
    description: Occasion syncs to calendar event

  - type: one_to_one
    from: OccasionReminder
    to: notification:Notification
    foreign_key: notificationId
    description: Reminder triggers notification

  - type: one_to_one
    from: GroupGiftContribution
    to: finance:Payment
    foreign_key: paymentId
    description: Contribution links to payment

  - type: one_to_one
    from: ThankYouNote
    to: messaging:Message
    foreign_key: messageId
    description: Thank you can be a message

  - type: one_to_one
    from: WishlistItem
    to: Gift
    foreign_key: wishlistItemId
    description: Wishlist item fulfilled by gift

  # Cross-domain: linking
  - type: one_to_one
    from: Wishlist
    to: linking:DeepLink
    foreign_key: deepLinkId
    description: Wishlist shareable via deep link

  - type: one_to_one
    from: Wishlist
    to: linking:QRCode
    foreign_key: qrCodeId
    description: Wishlist shareable via QR code

  - type: one_to_one
    from: WishlistItem
    to: linking:ProductLink
    foreign_key: productLinkId
    description: Wishlist item links to product with rich metadata

  # Cross-domain: data-sync (for offline support)
  # Note: Entities embed sync fields (syncVersion, lastSyncedAt)
  # and link to data-sync:OfflineSyncQueue at app level
