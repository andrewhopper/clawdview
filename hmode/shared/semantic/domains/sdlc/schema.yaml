# SDLC Domain Model
# Software Development Lifecycle - approval workflows and artifacts

domain:
  name: sdlc
  version: "1.1.0"
  description: 9-phase SDLC workflow with approval levels, artifacts, decision criteria, and approval paths
  dependencies: [core]
  created_at: "2025-11-21"
  updated_at: "2025-11-22"

entities:

  Prototype:
    description: A software prototype in the SDLC workflow
    properties:
      id: { type: string, required: true }
      name: { type: string, required: true }
      description: { type: string }
      currentPhase: { type: SDLCPhase, required: true }
      approvalPath: { type: ApprovalPathType }
      artifacts: { type: array, items: Artifact }
      createdAt: { type: datetime, required: true }
      updatedAt: { type: datetime, required: true }

  Artifact:
    description: A deliverable artifact (sitemap, mockup, domain model, etc.)
    properties:
      id: { type: string, required: true }
      identifier: { type: string, required: true, description: "Unique ID (SM-1.1, US-2.3, WF-1.1.V2)" }
      name: { type: string, required: true }
      type: { type: ArtifactType, required: true }
      status: { type: ArtifactStatus, required: true }
      requiresApproval: { type: ApprovalLevel }
      approvedBy: { type: string }
      approvedAt: { type: datetime }
      versionNumber: { type: integer }
      content: { type: string }
      createdAt: { type: datetime, required: true }
      updatedAt: { type: datetime, required: true }

  ApprovalLevel:
    description: A checkpoint requiring human approval in Phase 6
    properties:
      id: { type: string, required: true }
      name: { type: string, required: true }
      sequenceNumber: { type: decimal, required: true }
      deliverable: { type: string, description: "Expected file or folder" }
      idFormat: { type: string, description: "ID naming format" }
      fidelity: { type: string, description: "Level of detail" }
      approvalActions: { type: array, items: string }
      isVersioned: { type: boolean, default: false }

  SitemapNode:
    description: A single page or section in the sitemap
    properties:
      id: { type: string, required: true }
      identifier: { type: string, required: true }
      name: { type: string, required: true }
      parentNodeId: { type: string }
      children: { type: array, items: string, description: "Child node IDs" }
      pageType: { type: string }
      description: { type: string }

  DomainEntity:
    description: A business entity in the domain model
    properties:
      id: { type: string, required: true }
      identifier: { type: string, required: true }
      name: { type: string, required: true }
      description: { type: string }
      properties: { type: object }
      relationships: { type: array, items: EntityRelationship }

  EntityRelationship:
    description: Relationship between domain entities
    properties:
      targetEntityId: { type: string, required: true }
      relationshipType: { type: RelationshipType, required: true }
      description: { type: string }

  APIEndpoint:
    description: A REST API endpoint with request/response contract
    properties:
      id: { type: string, required: true }
      identifier: { type: string, required: true }
      path: { type: string, required: true }
      method: { type: HTTPMethod, required: true }
      description: { type: string }
      requestSchema: { type: object }
      responseSchema: { type: object }
      exposesEntity: { type: string }

  UserStory:
    description: A user-facing scenario in 'As a..., I can..., so that...' format
    properties:
      id: { type: string, required: true }
      identifier: { type: string, required: true }
      title: { type: string, required: true }
      asA: { type: string, required: true }
      iCan: { type: string, required: true }
      soThat: { type: string, required: true }
      epicId: { type: string }
      acceptanceCriteria: { type: array, items: string }
      priority: { type: StoryPriority }

  Epic:
    description: A collection of related user stories
    properties:
      id: { type: string, required: true }
      name: { type: string, required: true }
      description: { type: string }
      stories: { type: array, items: string, description: "Story IDs" }

  Mockup:
    description: A visual representation of UI (wireframe, clickable, or hi-fi)
    properties:
      id: { type: string, required: true }
      identifier: { type: string, required: true }
      name: { type: string, required: true }
      fidelityLevel: { type: FidelityLevel, required: true }
      implementsStory: { type: string, description: "User story ID" }
      versionNumber: { type: integer, default: 1 }
      content: { type: string, description: "ASCII art, HTML, or file path" }

  ApprovalPath:
    description: A predefined sequence of approval levels based on project type
    properties:
      id: { type: string, required: true }
      name: { type: string, required: true }
      requiredLevels: { type: array, items: string }
      optionalLevels: { type: array, items: string }
      useCases: { type: string, description: "When to use this path" }

  # ============================================
  # DECISION CRITERIA (Phase 4/5)
  # ============================================

  DecisionCriteria:
    description: Decision criteria and weights used during Phase 4/5 selection
    properties:
      id: { type: string, required: true }
      prototypeId: { type: string, required: true }
      criteriaUsed: { type: array, items: Criterion }
      optionsEvaluated: { type: array, items: TechnologyOption }
      exceptions: { type: array, items: DecisionException }
      rationale: { type: string, required: true }
      tradeOffsAccepted: { type: array, items: string }
      createdAt: { type: datetime, required: true }
      updatedAt: { type: datetime, required: true }

  Criterion:
    description: Individual criterion with category, weight, and score
    properties:
      id: { type: string, required: true }
      category: { type: CriterionCategory, required: true }
      criterion: { type: string, required: true, description: "e.g., 'Simple over complex', 'TypeScript strict mode'" }
      weight: { type: DecisionWeight, required: true }
      score: { type: integer, required: true, description: "+10, +5, +2, 0, -2, -5, -10" }
      rationale: { type: string }

  TechnologyOption:
    description: Technology option evaluated during selection
    properties:
      id: { type: string, required: true }
      optionId: { type: string, required: true, description: "A, B, C, etc." }
      description: { type: string, required: true }
      techStack: { type: TechStack }
      totalScore: { type: decimal, required: true }
      isSelected: { type: boolean, required: true }
      tradeOffs: { type: array, items: string }
      pros: { type: array, items: string }
      cons: { type: array, items: string }

  TechStack:
    description: Technology stack configuration
    properties:
      language: { type: string }
      framework: { type: string }
      database: { type: string }
      styling: { type: string }
      cloudProvider: { type: string }
      deploymentPattern: { type: string }
      other: { type: array, items: string }

  DecisionException:
    description: Documented exception to standard criteria
    properties:
      id: { type: string, required: true }
      criterionViolated: { type: string, required: true }
      weight: { type: DecisionWeight, required: true }
      justification: { type: string, required: true }
      mitigations: { type: array, items: string }

enums:

  SDLCPhase:
    values:
      - SEED              # Phase 1
      - RESEARCH          # Phase 2
      - FEASIBILITY       # Phase 2.5
      - EXPANSION         # Phase 3
      - ANALYSIS          # Phase 4
      - SELECTION         # Phase 5
      - TECHNICAL_DESIGN  # Phase 6
      - TEST_DESIGN       # Phase 7
      - IMPLEMENTATION    # Phase 8
      - REFINEMENT        # Phase 9

  ArtifactType:
    values:
      - Sitemap
      - DomainModel
      - APIContract
      - UserStory
      - SitemapMockup
      - Wireframe
      - ClickablePrototype
      - HiFiMockup
      - ImplementationStrategy

  ArtifactStatus:
    values:
      - Draft
      - PendingApproval
      - Approved
      - Rejected
      - Superseded

  ApprovalPathType:
    values:
      - Minimal           # Track A: Internal tools, POCs
      - Standard          # Track B: Client deliverables
      - DesignFirst       # Marketing sites, dashboards
      - APIFirst          # APIs, libraries, CLIs
      - Full              # Enterprise, regulated industries

  FidelityLevel:
    values:
      - ASCII             # Text-based layout
      - LoFi              # Low-fidelity wireframe
      - InteractiveLoFi   # Clickable prototype
      - HiFi              # Production design

  RelationshipType:
    values:
      - OneToOne
      - OneToMany
      - ManyToMany
      - ManyToOne

  HTTPMethod:
    values: [GET, POST, PUT, PATCH, DELETE]

  StoryPriority:
    values: [Must, Should, Could, Wont]

  CriterionCategory:
    description: Categories for decision criteria
    values:
      - Architecture
      - TechStackLanguage
      - TechStackFramework
      - TechStackData
      - TechStackStyling
      - Community
      - DeveloperExperience
      - Performance
      - Security
      - Testing
      - Deployment
      - Cost
      - Custom

  DecisionWeight:
    description: Weight/preference level for criteria
    values:
      - ALWAYS           # Non-negotiable (+10)
      - STRONGLY_PREFER  # Strong preference (+5)
      - PREFER           # Preferred (+2)
      - NEUTRAL          # No preference (0)
      - AVOID            # Avoid if alternatives (-2)
      - STRONGLY_AVOID   # Strong avoidance (-5)
      - NEVER            # Unacceptable (-10)

# Pre-defined Approval Levels
approval_levels:

  Level1_Sitemap:
    name: "Level 1: Information Architecture"
    sequenceNumber: 1
    deliverable: "SITEMAP.md"
    idFormat: "SM-[Section].[Page]"
    fidelity: "Conceptual"
    approvalActions: [approve, reject-regenerate, edit]

  Level2_DomainModel:
    name: "Level 2: Domain Model"
    sequenceNumber: 2
    deliverable: "DOMAIN_MODEL.md"
    idFormat: "DM-[Entity]"
    fidelity: "Data Structures"
    approvalActions: [approve, reject-regenerate, edit]

  Level3_APIContract:
    name: "Level 3: API Contract"
    sequenceNumber: 3
    deliverable: "API_CONTRACT.md"
    idFormat: "API-[Resource].[Method]"
    fidelity: "Request/Response Schemas"
    approvalActions: [approve, reject-regenerate, edit]

  Level4_UserStories:
    name: "Level 4: User Stories"
    sequenceNumber: 4
    deliverable: "USER_STORIES.md"
    idFormat: "US-[Epic].[Story]"
    fidelity: "User Scenarios"
    approvalActions: [approve, reject-regenerate, edit, add]

  Level5A_SitemapMockup:
    name: "Level 5A: Sitemap Mockup (Text)"
    sequenceNumber: 5.1
    deliverable: "SITEMAP_MOCKUP.md"
    idFormat: "SMM-[Section].[Page].V[Version]"
    fidelity: "ASCII Layout"
    isVersioned: true
    approvalActions: [approve, reject-regenerate, revise]

  Level5B_Wireframes:
    name: "Level 5B: Wireframes (Lo-Fi)"
    sequenceNumber: 5.2
    deliverable: "WIREFRAMES.md"
    idFormat: "WF-[Epic].[Story].V[Version]"
    fidelity: "Component Placement"
    isVersioned: true
    approvalActions: [approve, reject-regenerate, revise]

  Level6_ClickablePrototype:
    name: "Level 6: Clickable Prototype"
    sequenceNumber: 6
    deliverable: "prototypes/proto-XXX-clickable/"
    idFormat: "CP-[Epic].[Story].V[Version]"
    fidelity: "Interactive HTML"
    isVersioned: true
    approvalActions: [approve, reject-regenerate, revise]

  Level7_HiFiMockups:
    name: "Level 7: High-Fidelity Mockups"
    sequenceNumber: 7
    deliverable: "HI_FI_MOCKUPS.md"
    idFormat: "HF-[Epic].[Story].V[Version]"
    fidelity: "Production Visual Design"
    isVersioned: true
    approvalActions: [approve, reject-regenerate, revise]

  Level8_ImplementationStrategy:
    name: "Level 8: Implementation Strategy"
    sequenceNumber: 8
    deliverable: "IMPLEMENTATION_STRATEGY.md"
    idFormat: "N/A"
    fidelity: "Code Organization Plan"
    approvalActions: [approve, reject-regenerate]

# Pre-defined Approval Paths
approval_paths:

  Minimal:
    name: "Minimal Path (Track A)"
    requiredLevels: [Level4_UserStories, Level8_ImplementationStrategy]
    optionalLevels: [Level5B_Wireframes, Level6_ClickablePrototype]
    useCases: "Internal tools, POCs, learning projects"

  Standard:
    name: "Standard Path (Track B)"
    requiredLevels: [Level1_Sitemap, Level2_DomainModel, Level3_APIContract, Level4_UserStories, Level5B_Wireframes, Level8_ImplementationStrategy]
    optionalLevels: [Level5A_SitemapMockup, Level6_ClickablePrototype, Level7_HiFiMockups]
    useCases: "Client deliverables, production systems"

  DesignFirst:
    name: "Design-First Path"
    requiredLevels: [Level1_Sitemap, Level4_UserStories, Level5A_SitemapMockup, Level5B_Wireframes, Level6_ClickablePrototype, Level7_HiFiMockups, Level8_ImplementationStrategy]
    optionalLevels: [Level2_DomainModel, Level3_APIContract]
    useCases: "Marketing sites, dashboards, consumer apps"

  APIFirst:
    name: "API-First Path"
    requiredLevels: [Level2_DomainModel, Level3_APIContract, Level4_UserStories, Level8_ImplementationStrategy]
    optionalLevels: [Level1_Sitemap, Level5B_Wireframes]
    useCases: "APIs, libraries, CLIs, backend services"

  Full:
    name: "Full Path (Enterprise)"
    requiredLevels: [Level1_Sitemap, Level2_DomainModel, Level3_APIContract, Level4_UserStories, Level5A_SitemapMockup, Level5B_Wireframes, Level6_ClickablePrototype, Level7_HiFiMockups, Level8_ImplementationStrategy]
    optionalLevels: []
    useCases: "Mission-critical systems, regulated industries, large teams"
