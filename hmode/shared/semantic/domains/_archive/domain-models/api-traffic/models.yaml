      - not-yet-valid: "Certificate not yet valid"
      - self-signed: "Self-signed certificate"
      - untrusted-root: "Untrusted root certificate"
      - hostname-mismatch: "Hostname does not match certificate"
      - revoked: "Certificate has been revoked"
      - invalid-purpose: "Certificate not valid for purpose"
      - chain-broken: "Certificate chain is broken"
      - weak-signature: "Weak signature algorithm"
      - weak-key: "Weak public key"
      - invalid-extension: "Invalid certificate extension"
      - name-constraint-violation: "Name constraint violation"
