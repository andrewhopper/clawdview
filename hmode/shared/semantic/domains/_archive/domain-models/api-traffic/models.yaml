# ============================================
# WEBSOCKET PROTOCOL (RFC 6455)
# Source: https://datatracker.ietf.org/doc/html/rfc6455
# ============================================

  WebSocketConnection:
    description: "WebSocket connection (RFC 6455)"
    properties:
      id:
        type: uuid
        required: true
      captureId:
        type: uuid
        references: TrafficCapture.id
      connectionId:
        type: string
        required: true
        description: "Unique connection identifier"
      url:
        type: string
        required: true
        description: "WebSocket URL (ws:// or wss://)"
      handshake:
        type: WebSocketHandshake
        required: true
      frames:
        type: array
        items: WebSocketFrame
        description: "All frames sent/received"
      subprotocol:
        type: string
        description: "Negotiated subprotocol"
      extensions:
        type: array
        items: string
        description: "Negotiated extensions"
      state:
        type: enum
        enum_ref: WebSocketState
        required: true
      closeInfo:
        type: WebSocketCloseInfo
        description: "Close frame details if closed"
      startedAt:
        type: datetime
        required: true
      endedAt:
        type: datetime
      created_at:
        type: datetime
        required: true
        auto: true
      updated_at:
        type: datetime
        required: true
        auto: true

  WebSocketHandshake:
    description: "WebSocket opening handshake (HTTP Upgrade)"
    properties:
      request:
        type: HTTPRequest
        required: true
        description: "Upgrade request (GET with Connection: Upgrade)"
      response:
        type: HTTPResponse
        required: true
        description: "101 Switching Protocols response"
      key:
        type: string
        required: true
        description: "Sec-WebSocket-Key (base64)"
      accept:
        type: string
        required: true
        description: "Sec-WebSocket-Accept (base64)"
      version:
        type: integer
        default: 13
        description: "WebSocket protocol version"
      requestedSubprotocols:
        type: array
        items: string
        description: "Sec-WebSocket-Protocol values requested"
      acceptedSubprotocol:
        type: string
        description: "Negotiated subprotocol"
      requestedExtensions:
        type: array
        items: string
        description: "Sec-WebSocket-Extensions requested"
      acceptedExtensions:
        type: array
        items: string
        description: "Negotiated extensions"
      origin:
        type: string
        description: "Origin header value"
      success:
        type: boolean
        required: true
      timestamp:
        type: datetime
        required: true

  WebSocketFrame:
    description: "WebSocket frame (RFC 6455 Section 5.2)"
    properties:
      id:
        type: uuid
        required: true
      connectionId:
        type: uuid
        required: true
        references: WebSocketConnection.id
      direction:
        type: enum
        enum_ref: WebSocketDirection
        required: true
      fin:
        type: boolean
        required: true
        description: "FIN bit (final fragment)"
      rsv1:
        type: boolean
        default: false
        description: "RSV1 bit (extension)"
      rsv2:
        type: boolean
        default: false
        description: "RSV2 bit (extension)"
      rsv3:
        type: boolean
        default: false
        description: "RSV3 bit (extension)"
      opcode:
        type: enum
        enum_ref: WebSocketOpcode
        required: true
      masked:
        type: boolean
        required: true
        description: "Mask bit (client frames must be masked)"
      maskingKey:
        type: string
        description: "32-bit masking key (hex) if masked"
      payloadLength:
        type: integer
        required: true
        description: "Payload length in bytes"
      payloadData:
        type: string
        required: true
        description: "Frame payload (base64 for binary, text for text)"
      decodedText:
        type: string
        description: "Decoded text for text frames"
      timestamp:
        type: datetime
        required: true
      sequenceNumber:
        type: integer
        required: true
        description: "Frame sequence in connection"

  WebSocketCloseInfo:
    description: "WebSocket close frame details"
    properties:
      statusCode:
        type: integer
        required: true
        description: "Close status code (1000-4999)"
      reason:
        type: string
        description: "Close reason text"
      initiatedBy:
        type: enum
        enum_ref: WebSocketDirection
        required: true
        description: "Who sent close frame"
      timestamp:
        type: datetime
        required: true

  WebSocketState:
    description: "WebSocket connection state"
    values:
      - connecting: "Handshake in progress"
      - open: "Connection established"
      - closing: "Close frame sent/received"
      - closed: "Connection closed"
      - failed: "Handshake or connection failed"

  WebSocketDirection:
    description: "Frame direction"
    values:
      - client-to-server: "Outbound (client → server)"
      - server-to-client: "Inbound (server → client)"

  WebSocketOpcode:
    description: "WebSocket frame opcode (RFC 6455)"
    values:
      - continuation: "0x0 - Continuation frame"
      - text: "0x1 - Text frame (UTF-8)"
      - binary: "0x2 - Binary frame"
      - close: "0x8 - Close control frame"
      - ping: "0x9 - Ping control frame"
      - pong: "0xA - Pong control frame"
      - reserved-3: "0x3 - Reserved (non-control)"
      - reserved-4: "0x4 - Reserved (non-control)"
      - reserved-5: "0x5 - Reserved (non-control)"
      - reserved-6: "0x6 - Reserved (non-control)"
      - reserved-7: "0x7 - Reserved (non-control)"
      - reserved-B: "0xB - Reserved (control)"
      - reserved-C: "0xC - Reserved (control)"
      - reserved-D: "0xD - Reserved (control)"
      - reserved-E: "0xE - Reserved (control)"
      - reserved-F: "0xF - Reserved (control)"

  WebSocketCloseCode:
    description: "WebSocket close status codes (RFC 6455 Section 7.4)"
    values:
      - 1000: "Normal Closure"
      - 1001: "Going Away (server/browser closing)"
      - 1002: "Protocol Error"
      - 1003: "Unsupported Data (e.g. text-only endpoint got binary)"
      - 1004: "Reserved"
      - 1005: "No Status Received (internal use only, not on wire)"
      - 1006: "Abnormal Closure (internal use only, not on wire)"
      - 1007: "Invalid frame payload data (e.g. malformed UTF-8)"
      - 1008: "Policy Violation"
      - 1009: "Message Too Big"
      - 1010: "Mandatory Extension (client)"
      - 1011: "Internal Server Error"
      - 1012: "Service Restart"
      - 1013: "Try Again Later"
      - 1014: "Bad Gateway"
      - 1015: "TLS Handshake (internal use only, not on wire)"
      - 3000-3999: "Reserved for frameworks/libraries/apps"
      - 4000-4999: "Reserved for private use"

# ============================================
# HTTP/2 AND HTTP/3 MODELS
# Source: RFC 9113 (HTTP/2), RFC 9114 (HTTP/3)
# ============================================

  HTTP2Stream:
    description: "HTTP/2 stream (RFC 9113)"
    properties:
      id:
        type: uuid
        required: true
      streamId:
        type: integer
        required: true
        description: "Stream identifier (odd=client, even=server)"
      captureId:
        type: uuid
        references: TrafficCapture.id
      connectionId:
        type: string
        description: "HTTP/2 connection ID"
      priority:
        type: HTTP2Priority
        description: "Stream priority"
      frames:
        type: array
        items: HTTP2Frame
        description: "HEADERS, DATA, etc."
      request:
        type: HTTPRequest
        description: "Reconstructed request"
      response:
        type: HTTPResponse
        description: "Reconstructed response"
      state:
        type: enum
        enum_ref: HTTP2StreamState
        required: true
      created_at:
        type: datetime
        required: true
        auto: true
      updated_at:
        type: datetime
        required: true
        auto: true

  HTTP2Priority:
    description: "HTTP/2 stream priority"
    properties:
      exclusive:
        type: boolean
        description: "Exclusive dependency"
      streamDependency:
        type: integer
        description: "Stream ID this depends on"
      weight:
        type: integer
        description: "Priority weight (1-256)"

  HTTP2Frame:
    description: "HTTP/2 frame"
    properties:
      id:
        type: uuid
        required: true
      streamId:
        type: integer
        required: true
      type:
        type: enum
        enum_ref: HTTP2FrameType
        required: true
      flags:
        type: integer
        required: true
        description: "Frame flags byte"
      payload:
        type: string
        required: true
        description: "Frame payload (base64)"
      timestamp:
        type: datetime
        required: true

  HTTP2StreamState:
    description: "HTTP/2 stream state"
    values:
      - idle: "Stream idle"
      - reserved-local: "Reserved (local)"
      - reserved-remote: "Reserved (remote)"
      - open: "Stream open"
      - half-closed-local: "Half-closed (local)"
      - half-closed-remote: "Half-closed (remote)"
      - closed: "Stream closed"

  HTTP2FrameType:
    description: "HTTP/2 frame types (RFC 9113)"
    values:
      - DATA: "0x0 - Data frame"
      - HEADERS: "0x1 - Headers frame"
      - PRIORITY: "0x2 - Priority frame"
      - RST_STREAM: "0x3 - Reset stream"
      - SETTINGS: "0x4 - Settings frame"
      - PUSH_PROMISE: "0x5 - Server push promise"
      - PING: "0x6 - Ping frame"
      - GOAWAY: "0x7 - Go away frame"
      - WINDOW_UPDATE: "0x8 - Window update"
      - CONTINUATION: "0x9 - Continuation frame"
