        required: true
      age_range:
        type: string
        description: "e.g., '18+', 'All ages'"
      is_faith_based:
        type: boolean
        default: true
      program:
        type: RecoveryProgram
        description: "e.g., 12-step, Celebrate Recovery"

      # Hosting
      host_church_id:
        type: string
      host_organization:
        type: string

      # Privacy
      is_confidential:
        type: boolean
        default: true
      requires_registration:
        type: boolean
        default: false

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 26. PLAY GROUP / KIDS GROUP - Family & children meetups
  # ---------------------------------------------------------------------------

  PlayGroup:
    description: "Play group, moms group, or family meetup"
    properties:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      group_type:
        type: PlayGroupType
        required: true
      description:
        type: string

      # Target audience
      age_range_min:
        type: integer
        description: "Minimum child age in months"
      age_range_max:
        type: integer
        description: "Maximum child age in months"
      parent_type:
        type: ParentType
        description: "Moms only, dads only, or all parents"

      # Meeting info
      meeting_frequency:
        type: MeetingFrequency
        required: true
      meeting_day:
        type: DayOfWeek
      meeting_time:
        type: string
      typical_duration_minutes:
        type: integer
        default: 90

      # Location
      location_type:
        type: PlayGroupLocationType
        required: true
      location_name:
        type: string
      address:
        type: string
      city:
        type: string
        required: true
      state:
        type: string
      coordinates:
        type: GeoPoint

      # Contact
      organizer_name:
        type: string
      contact_email:
        type: string
        format: email

      # Group details
      max_families:
        type: integer
      current_families:
        type: integer
        default: 0
      is_accepting_new:
        type: boolean
        default: true
      cost:
        type: string
        description: "Free, $5/session, etc."

      # Hosting
      host_church_id:
        type: string

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 27. COMMUNITY RESOURCE - General resources (food banks, counseling, etc.)
  # ---------------------------------------------------------------------------

  CommunityResource:
    description: "General community resource (food bank, counseling, etc.)"
    properties:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      resource_type:
        type: ResourceType
        required: true
      description:
        type: string

      # Contact
      address:
        type: string
      city:
        type: string
        required: true
      state:
        type: string
      zip_code:
        type: string
      phone:
        type: string
      email:
        type: string
        format: email
      website:
        type: string
        format: uri
      coordinates:
        type: GeoPoint

      # Hours
      hours_of_operation:
        type: string
        description: "Free-form hours text"
      is_24_hour:
        type: boolean
        default: false

      # Services offered
      services:
        type: array
        items: string
      eligibility:
        type: string
        description: "Requirements to receive service"
      cost:
        type: string
        description: "Free, sliding scale, etc."

      # Organization
      organization_name:
        type: string
      is_faith_based:
        type: boolean
        default: false
      host_church_id:
        type: string

      # Verification
      is_verified:
        type: boolean
        default: false
      last_verified_at:
        type: datetime

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 28. RESOURCE REVIEW - User reviews for directory entries
  # ---------------------------------------------------------------------------

  ResourceReview:
    description: "User review of a church, group, or resource"
    properties:
      id:
        type: string
        required: true
      user_id:
        type: string
        required: true
      resource_type:
        type: DirectoryResourceType
        required: true
      resource_id:
        type: string
        required: true
        description: "ID of Church, SupportGroup, etc."

      # Review content
      rating:
        type: integer
        required: true
        minimum: 1
        maximum: 5
      title:
        type: string
        maxLength: 100
      content:
        type: string
        maxLength: 2000

      # Specific ratings
      welcoming_rating:
        type: integer
        minimum: 1
        maximum: 5
      kids_friendly_rating:
        type: integer
        minimum: 1
        maximum: 5

      # Status
      is_verified_visit:
        type: boolean
        default: false
      helpful_count:
        type: integer
        default: 0

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 29. SAVED RESOURCE - User's saved/bookmarked resources
  # ---------------------------------------------------------------------------

  SavedResource:
    description: "User's saved directory item"
    properties:
      user_id:
        type: string
        required: true
      resource_type:
        type: DirectoryResourceType
        required: true
      resource_id:
        type: string
        required: true
      notes:
        type: string
      saved_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 30. USER STORY - User-created Bible story
  # ---------------------------------------------------------------------------

  UserStory:
    description: "A custom Bible story created by a user"
    properties:
      id:
        type: string
        required: true
      creator_id:
        type: string
        required: true
        description: "User who created this story"

      # Story metadata
      title:
        type: string
        required: true
        maxLength: 100
      description:
        type: string
        maxLength: 500
      cover_image_url:
        type: string
        format: uri

      # Classification
      story_type:
        type: StoryType
        required: true
      target_age:
        type: AgeGroup
        required: true
      topics:
        type: array
        items: StoryTopic
      bible_characters:
        type: array
        items: string
        description: "IDs of Biblical characters featured"
      scripture_refs:
        type: array
        items: ScriptureRef

      # Content
      scenes:
        type: array
        items: StoryScene
        description: "Ordered list of scenes"

      # Media
      has_audio:
        type: boolean
        default: false
      audio_url:
        type: string
        format: uri
      estimated_duration_seconds:
        type: integer

      # Template
      template_id:
        type: string
        description: "Template used if any"

      # Status & Visibility
      status:
        type: StoryStatus
        default: Draft
      visibility:
        type: StoryVisibility
        default: Private
      is_featured:
        type: boolean
        default: false
      is_curated:
        type: boolean
        default: false
        description: "Approved by moderators"

      # Stats
      view_count:
        type: integer
        default: 0
      like_count:
        type: integer
        default: 0
      share_count:
        type: integer
        default: 0
      save_count:
        type: integer
        default: 0

      # Timestamps
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true
      published_at:
        type: datetime

  # ---------------------------------------------------------------------------
  # 31. STORY SCENE - Individual scene in a user story
  # ---------------------------------------------------------------------------

  StoryScene:
    description: "A single scene/page in a story"
    properties:
      id:
        type: string
        required: true
      story_id:
        type: string
        required: true
      position:
        type: integer
        required: true
        description: "Order in the story (1-based)"

      # Content
      scene_type:
        type: SceneType
        required: true
      title:
        type: string
        maxLength: 100
      text_content:
        type: string
        maxLength: 2000

      # Media
      background_image_url:
        type: string
        format: uri
      character_images:
        type: array
        items: SceneCharacterImage
      audio_url:
        type: string
        format: uri
        description: "Scene-specific narration"

      # Interactive elements
      has_quiz:
        type: boolean
        default: false
      quiz_question:
        type: string
      quiz_options:
        type: array
        items: string
      quiz_correct_index:
        type: integer

      # Animation
      animation_type:
        type: SceneAnimation
        default: Fade

      # Scripture
      scripture_ref:
        type: ScriptureRef

