# =============================================================================
# ACTIONS - CRUD operations
# =============================================================================

actions:

  ViewPersonAction:
    type: read
    operatesOn: BiblicalPerson
    params:
      person_id: { type: string, required: true }
      age_group: { type: AgeGroup, required: true }
    returns: BiblicalPerson

  CreateJournalEntryAction:
    type: create
    operatesOn: PrayerJournalEntry
    params:
      content: { type: string, required: true }
      title: { type: string }
      prayer_type: { type: PrayerType }
      mood: { type: JournalMood }
    returns: PrayerJournalEntry

  MarkPrayerAnsweredAction:
    type: update
    operatesOn: PrayerJournalEntry
    params:
      entry_id: { type: string, required: true }
      answer_notes: { type: string }
    returns: PrayerJournalEntry

  StartTriviaAction:
    type: create
    operatesOn: TriviaSession
    params:
      game_type: { type: GameType, required: true }
      age_group: { type: AgeGroup, required: true }
      topic: { type: TriviaTopic }
      count: { type: integer, default: 10 }
    returns: TriviaSession

  SubmitAnswerAction:
    type: update
    operatesOn: TriviaSession
    params:
      session_id: { type: string, required: true }
      question_id: { type: string, required: true }
      answer: { type: string, required: true }
    returns:
      is_correct: boolean
      explanation: string
      new_score: integer

  GenerateAudioAction:
    type: create
    operatesOn: AudioNarration
    params:
      content_type: { type: ContentType, required: true }
      content_id: { type: string, required: true }
      age_group: { type: AgeGroup, required: true }
      voice_id: { type: string, default: "Joanna" }
    returns: AudioNarration

