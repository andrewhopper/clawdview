# =============================================================================
# Domain: bible-learning
# Version: 0.5.0
# Status: development
# Dependencies: core@^1.0.0, story@^1.0.0, auth@^0.1.0
# Created: 2025-12-15
# Updated: 2025-12-15
# Spec: /shared/semantic/VERSIONED_SCHEMA_SPEC.md
# Project: bible-buddy-a66e1
# =============================================================================

domain:
  name: bible-learning
  version: "0.6.0"
  description: "Multimodal Bible learning domain for visual learners and ADHD users"
  namespace: "https://protoflow.ai/ontology/bible-learning#"
  created_at: "2025-12-15"
  updated_at: "2025-12-15"
  dependencies:
    core: "^1.0.0"       # Person, Location, TimeRange, DateRange
    story: "^1.0.0"      # Character traits, Scene patterns
    auth: "^0.1.0"       # User, Session
    _primitives/entity: "^1.0.0"  # IdentifiableThing, ExistenceInfo
    _primitives/relation: "^1.0.0"  # Relationship patterns

  changelog:
    "0.1.0": "Initial development version"
    "0.2.0": "Refactored to extend core.Person, use TimeRange, proper decomposition"
    "0.3.0": "Added shared prayer journals and study guides"
    "0.4.0": "Added media (video/audio) and community (needs/giving) features"
    "0.5.0": "Added resources directory (churches, support groups, play groups)"
    "0.6.0": "Added story creator, showcase, sharing, and progress tracking"

# =============================================================================
# PRIMITIVE EXTENSIONS - Reusing core primitives
# =============================================================================

primitives_used:
  from_core:
    - Person           # Extended by BiblicalPerson
    - Location         # Extended by BiblicalLocation
    - TimeRange        # Used for life spans, reign periods
    - DateRange        # Used for events
    - TimePoint        # Used for specific moments
  from_entity:
    - IdentifiableThing  # Base for all entities
    - ExistenceInfo      # Birth/death tracking
    - Reference          # Cross-references
  from_relation:
    - Relationship       # Family, connections

# =============================================================================
# ENTITIES - Properly Decomposed
# =============================================================================

entities:

  # ---------------------------------------------------------------------------
  # 1. BIBLICAL PERSON - Extends core.Person
  # ---------------------------------------------------------------------------

  BiblicalPerson:
    description: "A person mentioned in the Bible"
    extends: core.Person  # Gets firstName, lastName, fullName, dateOfBirth
    properties:
      # Identity (from IdentifiableThing pattern)
      id:
        type: string
        required: true
        description: "Unique slug identifier (e.g., 'abraham')"

      # Names - extending core.Person
      hebrew_name:
        type: LocalizedName
        description: "Original Hebrew name"
      greek_name:
        type: LocalizedName
        description: "Greek name (Septuagint/NT)"
      aliases:
        type: array
        items: LocalizedName
        description: "Other names (Abram→Abraham, Saul→Paul)"

      # Lifespan - using core.TimeRange
      lifespan:
        type: LifeSpan
        description: "Birth to death period"

      # Role & Classification
      primary_role:
        type: BiblicalRole
        required: true
      secondary_roles:
        type: array
        items: BiblicalRole
      testament:
        type: Testament
        required: true
      period:
        type: BiblicalPeriod
        required: true

      # Visual representation
      icon:
        type: string
        description: "Emoji representation"
      image_url:
        type: string
        format: uri

      # Content - Decomposed by age
      facts:
        type: AgeAdaptiveContent
        required: true

      # References
      scripture_refs:
        type: array
        items: ScriptureRef
      primary_locations:
        type: array
        items: Reference  # References to BiblicalLocation

      # Timestamps (from ExistenceInfo pattern)
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 2. LOCALIZED NAME - Atomic component
  # ---------------------------------------------------------------------------

  LocalizedName:
    description: "A name with language/script context"
    properties:
      value:
        type: string
        required: true
      language:
        type: Language
        required: true
      script:
        type: string
        description: "Hebrew, Greek, Latin, etc."
      meaning:
        type: string
        description: "Name meaning"
      transliteration:
        type: string
        description: "Phonetic rendering"

  # ---------------------------------------------------------------------------
  # 3. LIFESPAN - Extends core.TimeRange for biblical context
  # ---------------------------------------------------------------------------

  LifeSpan:
    description: "Life period with biblical year notation"
    extends: core.TimeRange  # Gets start_date, end_date, is_current
    properties:
      birth_year_bce:
        type: integer
        description: "Birth year (positive = BCE)"
      death_year_bce:
        type: integer
        description: "Death year (positive = BCE, null if alive in narrative)"
      age_at_death:
        type: integer
        description: "Recorded age at death if known"
      is_approximate:
        type: boolean
        default: true
        description: "Historical dates are estimates"
      era:
        type: BiblicalPeriod
        description: "Which era they primarily lived in"

  # ---------------------------------------------------------------------------
  # 4. REIGN PERIOD - For kings, judges, etc.
  # ---------------------------------------------------------------------------

  ReignPeriod:
    description: "Period of authority/leadership"
    extends: core.TimeRange
    properties:
      person_id:
        type: string
        required: true
      role:
        type: BiblicalRole
        required: true
      territory:
        type: string
        description: "Israel, Judah, Egypt, etc."
      start_year_bce:
        type: integer
      end_year_bce:
        type: integer
      predecessor_id:
        type: string
      successor_id:
        type: string

  # ---------------------------------------------------------------------------
  # 5. FAMILY RELATIONSHIP - Uses relation primitive pattern
  # ---------------------------------------------------------------------------

  FamilyRelationship:
    description: "Family connection between two people"
    extends: _primitives/relation.Relationship
    properties:
      from_person_id:
        type: string
        required: true
      to_person_id:
        type: string
        required: true
      relation_type:
        type: FamilyRelationType
        required: true
      is_biological:
        type: boolean
        default: true
      notes:
        type: string
        description: "Adoption, marriage, etc."

  # ---------------------------------------------------------------------------
  # 6. BIBLICAL LOCATION - Extends core.Location
  # ---------------------------------------------------------------------------

  BiblicalLocation:
    description: "A geographical location in the Bible"
    extends: core.Location
    properties:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      localized_names:
        type: array
        items: LocalizedName

      # Geography
      coordinates:
        type: GeoPoint
      modern_name:
        type: string
      modern_country:
        type: string
      region:
        type: BiblicalRegion
        required: true

      # Classification
      location_type:
        type: LocationType
        required: true
      significance:
        type: array
        items: LocationSignificance

      # Content
      facts:
        type: AgeAdaptiveContent

      # References
      events_here:
        type: array
        items: Reference  # To BiblicalEvent
      notable_people:
        type: array
        items: Reference  # To BiblicalPerson

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  GeoPoint:
    description: "Geographic coordinates"
    properties:
      latitude:
        type: number
        required: true
        minimum: -90
        maximum: 90
      longitude:
        type: number
        required: true
        minimum: -180
        maximum: 180
      elevation_m:
        type: integer

  LocationSignificance:
    description: "Why a location matters"
    properties:
      event_type:
        type: string
        required: true
        description: "Birth, Death, Miracle, Battle, etc."
      person_id:
        type: string
      event_id:
        type: string
      description:
        type: string

  # ---------------------------------------------------------------------------
  # 7. BIBLICAL EVENT - Uses DateRange
  # ---------------------------------------------------------------------------

  BiblicalEvent:
    description: "A significant event in the Bible"
    properties:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      description:
        type: string

      # Time - using core.DateRange pattern
      time_range:
        type: EventTimeRange

      # Classification
      event_type:
        type: EventType
        required: true
      period:
        type: BiblicalPeriod
        required: true
      testament:
        type: Testament
        required: true

      # Participants & Location
      location_id:
        type: string
      participants:
        type: array
        items: EventParticipant

      # Content
      facts:
        type: AgeAdaptiveContent
      scripture_refs:
        type: array
        items: ScriptureRef

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  EventTimeRange:
    description: "Time range for biblical events"
    extends: core.DateRange
    properties:
      year_bce:
        type: integer
        description: "Approximate year (positive = BCE)"
      is_approximate:
        type: boolean
        default: true
      duration_description:
        type: string
        description: "40 days, 3 years, instant, etc."

  EventParticipant:
    description: "Person's role in an event"
    properties:
      person_id:
        type: string
        required: true
      role:
        type: ParticipantRole
        required: true
      description:
        type: string

  # ---------------------------------------------------------------------------
  # 8. JOURNEY - Sequence of locations over time
  # ---------------------------------------------------------------------------

  Journey:
    description: "A travel route in the Bible"
    properties:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
        description: "Exodus Route, Paul's First Missionary Journey"

      # Who & When
      traveler_id:
        type: string
        required: true
      time_range:
        type: EventTimeRange

      # Route
      waypoints:
        type: array
        items: Waypoint
        required: true

      # Content
      facts:
        type: AgeAdaptiveContent
      purpose:
        type: string

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  Waypoint:
    description: "A stop on a journey"
    properties:
      sequence:
        type: integer
        required: true
      location_id:
        type: string
        required: true
      event_description:
        type: string
      duration:
        type: string
        description: "3 days, 40 years, etc."

  # ---------------------------------------------------------------------------
  # 9. SCRIPTURE REFERENCE - Atomic
  # ---------------------------------------------------------------------------

  ScriptureRef:
    description: "Reference to Bible verse(s)"
    properties:
      book:
        type: BibleBook
        required: true
      chapter:
        type: integer
        required: true
        minimum: 1
      verse_start:
        type: integer
        required: true
        minimum: 1
      verse_end:
        type: integer
      translation:
        type: BibleTranslation
        default: NIV

  # ---------------------------------------------------------------------------
  # 10. AGE-ADAPTIVE CONTENT - Decomposed content by audience
  # ---------------------------------------------------------------------------

  AgeAdaptiveContent:
    description: "Content adapted for different audiences"
    properties:
      kids_3_6:
        type: ContentBlock
      kids_7_10:
        type: ContentBlock
      teen:
        type: ContentBlock
      adult:
        type: ContentBlock

  ContentBlock:
    description: "A piece of content with optional media"
    properties:
      text:
        type: string
        required: true
        maxLength: 1000
      visual:
        type: string
        description: "Emoji or image URL"
      audio_url:
        type: string
        format: uri
        description: "Pre-generated Polly audio"
      reading_level:
        type: string
        description: "Flesch-Kincaid grade level"

  # ---------------------------------------------------------------------------
  # 11. AUDIO NARRATION - Separate from content
  # ---------------------------------------------------------------------------

  AudioNarration:
    description: "Generated audio for content"
    properties:
      id:
        type: string
        required: true
      content_type:
        type: ContentType
        required: true
      content_id:
        type: string
        required: true
      age_group:
        type: AgeGroup
        required: true

      # Audio details
      audio_url:
        type: string
        format: uri
        required: true
      duration_seconds:
        type: integer
      voice_id:
        type: string
        description: "Polly voice ID"
      transcript:
        type: string

      generated_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 12. PRAYER - Standalone entity
  # ---------------------------------------------------------------------------

  Prayer:
    description: "A prayer from scripture or library"
    properties:
      id:
        type: string
        required: true
      title:
        type: string
        required: true
      text:
        type: string
        required: true

      # Classification
      source:
        type: PrayerSource
        required: true
      topics:
        type: array
        items: PrayerTopic
        required: true
      scripture_ref:
        type: ScriptureRef

      # Audience
      suitable_for:
        type: array
        items: AgeGroup

      # Media
      audio_url:
        type: string
        format: uri

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 13. PRAYER JOURNAL - Shareable container for entries
  # ---------------------------------------------------------------------------

  PrayerJournal:
    description: "A prayer journal that can be shared among multiple users"
    properties:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
        maxLength: 100
        description: "e.g., 'Family Prayer Journal', 'Youth Group Prayers'"
      description:
        type: string
        maxLength: 500
      owner_id:
        type: string
        required: true
        description: "User who created the journal"

      # Sharing settings
      visibility:
        type: JournalVisibility
        required: true
        default: Private
      invite_code:
        type: string
        description: "Code for joining shared journals"

      # Members
      members:
        type: array
        items: JournalMember
        description: "Users with access to this journal"

      # Stats
      entry_count:
        type: integer
        default: 0
      answered_prayer_count:
        type: integer
        default: 0

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  JournalMember:
    description: "A member of a shared prayer journal"
    properties:
      user_id:
        type: string
        required: true
      role:
        type: JournalRole
        required: true
        default: Member
      joined_at:
        type: datetime
        required: true
      invited_by:
        type: string
        description: "User who invited this member"
      can_see_private:
        type: boolean
        default: false
        description: "Can see entries marked private by others"

  # ---------------------------------------------------------------------------
  # 14. PRAYER JOURNAL ENTRY - Now references a journal
  # ---------------------------------------------------------------------------

  PrayerJournalEntry:
    description: "An entry in a prayer journal (personal or shared)"
    properties:
      id:
        type: string
        required: true
      journal_id:
        type: string
        required: true
        description: "Reference to PrayerJournal"
      author_id:
        type: string
        required: true
        description: "User who wrote this entry"

      # Content
      title:
        type: string
        maxLength: 200
      content:
        type: string
        required: true
        maxLength: 5000
      prayer_type:
        type: PrayerType
      mood:
        type: JournalMood
      tags:
        type: array
        items: string

      # Answer tracking
      is_answered:
        type: boolean
        default: false
      answered_at:
        type: datetime
      answer_notes:
        type: string

      # Privacy within shared journal
      visibility:
        type: EntryVisibility
        default: Journal
        description: "Who can see this entry"

      # Reactions from other members
      reactions:
        type: array
        items: EntryReaction

      # Media
      audio_recording_url:
        type: string
        format: uri

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  EntryReaction:
    description: "A reaction to a prayer entry (praying with, amen, etc.)"
    properties:
      user_id:
        type: string
        required: true
      reaction_type:
        type: ReactionType
        required: true
      created_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 15. STUDY GUIDE - Bible reading plans
  # ---------------------------------------------------------------------------

  StudyGuide:
    description: "A structured Bible reading/study plan"
    properties:
      id:
        type: string
        required: true
      title:
        type: string
        required: true
        description: "e.g., '7 Days in Proverbs', 'Bible in a Year'"
      description:
        type: string
        maxLength: 1000

      # Classification
      guide_type:
        type: StudyGuideType
        required: true
      difficulty:
        type: Difficulty
      suitable_for:
        type: array
        items: AgeGroup
      topics:
        type: array
        items: StudyTopic

      # Duration
      duration_days:
        type: integer
        required: true
        description: "7, 30, 365, etc."
      estimated_minutes_per_day:
        type: integer
        description: "Approximate time commitment"

      # Content
      days:
        type: array
        items: StudyDay
        required: true

      # Cover/branding
      cover_image_url:
        type: string
        format: uri
      icon:
        type: string
        description: "Emoji representation"

      # Metadata
      author:
        type: string
      source:
        type: string
        description: "Where this plan came from"
      is_featured:
        type: boolean
        default: false

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  StudyDay:
    description: "One day's content in a study guide"
    properties:
      day_number:
        type: integer
        required: true
        minimum: 1
      title:
        type: string
        required: true
        description: "Day's theme or title"

      # Readings
      readings:
        type: array
        items: ReadingAssignment
        required: true

      # Reflection content
      reflection_prompt:
        type: string
        description: "Question or thought to consider"
      key_verse:
        type: ScriptureRef
        description: "Memory verse for the day"
      prayer_focus:
        type: string
        description: "What to pray about"

      # Age-adaptive content
      devotional:
        type: AgeAdaptiveContent
        description: "Devotional content by age"

      # Media
      audio_url:
        type: string
        format: uri
        description: "Audio devotional"
      video_url:
        type: string
        format: uri

      # Activity for kids
      activity:
        type: StudyActivity
        description: "Interactive activity for kids"

  ReadingAssignment:
    description: "A scripture reading assignment"
    properties:
      scripture_ref:
        type: ScriptureRef
        required: true
      reading_type:
        type: ReadingType
        required: true
        default: Primary
      estimated_minutes:
        type: integer
      notes:
        type: string
        description: "Context or focus for reading"

  StudyActivity:
    description: "An interactive activity for a study day"
    properties:
      activity_type:
        type: ActivityType
        required: true
      title:
        type: string
        required: true
      instructions:
        type: string
        required: true
      materials_needed:
        type: array
        items: string
      suitable_for:
        type: array
        items: AgeGroup

  # ---------------------------------------------------------------------------
  # 16. USER STUDY PROGRESS - Tracking study completion
  # ---------------------------------------------------------------------------

  UserStudyProgress:
    description: "Tracks a user's progress through a study guide"
    properties:
      id:
        type: string
        required: true
      user_id:
        type: string
        required: true
      guide_id:
        type: string
        required: true
        description: "Reference to StudyGuide"

      # Progress
      started_at:
        type: datetime
        required: true
      current_day:
        type: integer
        default: 1
      completed_days:
        type: array
        items: CompletedDay

      # Status
      status:
        type: StudyStatus
        required: true
        default: In_Progress
      completed_at:
        type: datetime

      # Streak tracking
      current_streak:
        type: integer
        default: 0
      longest_streak:
        type: integer
        default: 0
      last_activity_date:
        type: date

      # Settings
      reminder_time:
        type: string
        format: time
        description: "Daily reminder time (HH:MM)"
      reminder_enabled:
        type: boolean
        default: true

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  CompletedDay:
    description: "Record of a completed study day"
    properties:
      day_number:
        type: integer
        required: true
      completed_at:
        type: datetime
        required: true
      time_spent_minutes:
        type: integer
      notes:
        type: string
        description: "User's personal notes"
      marked_favorite:
        type: boolean
        default: false

  # ---------------------------------------------------------------------------
  # 14. TRIVIA QUESTION - Decomposed
  # ---------------------------------------------------------------------------

  TriviaQuestion:
    description: "A learning trivia question"
    properties:
      id:
        type: string
        required: true
      question_text:
        type: string
        required: true

      # Classification
      question_type:
        type: QuestionType
        required: true
      difficulty:
        type: Difficulty
        required: true
      age_group:
        type: AgeGroup
        required: true
      topic:
        type: TriviaTopic

      # Answer
      options:
        type: array
        items: AnswerOption
      correct_answer:
        type: string
        required: true
      explanation:
        type: string

      # Media
      image_url:
        type: string
        format: uri
      audio_url:
        type: string
        format: uri

      # Scoring
      points:
        type: integer
        default: 10
      time_limit_seconds:
        type: integer

      # References
      related_person_id:
        type: string
      related_location_id:
        type: string
      related_event_id:
        type: string

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  AnswerOption:
    description: "Multiple choice answer option"
    properties:
      id:
        type: string
        required: true
      text:
        type: string
        required: true
      image_url:
        type: string
        format: uri

  # ---------------------------------------------------------------------------
  # 15. TRIVIA SESSION - Game state
  # ---------------------------------------------------------------------------

  TriviaSession:
    description: "A trivia game session"
    properties:
      id:
        type: string
        required: true
      user_id:
        type: string
        required: true
      game_type:
        type: GameType
        required: true

      # State
      question_ids:
        type: array
        items: string
      current_index:
        type: integer
        default: 0
      answers:
        type: array
        items: UserAnswer

      # Scoring
      score:
        type: integer
        default: 0
      streak:
        type: integer
        default: 0

      # Time
      started_at:
        type: datetime
        required: true
      completed_at:
        type: datetime

  UserAnswer:
    description: "User's answer to a question"
    properties:
      question_id:
        type: string
        required: true
      selected_answer:
        type: string
        required: true
      is_correct:
        type: boolean
        required: true
      time_taken_ms:
        type: integer
      answered_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 16. USER PROGRESS - Learning tracking
  # ---------------------------------------------------------------------------

  UserProgress:
    description: "User's learning progress"
    properties:
      id:
        type: string
        required: true
      user_id:
        type: string
        required: true
      age_mode:
        type: AgeGroup
        required: true

      # Viewed content
      characters_viewed:
        type: array
        items: string
      locations_explored:
        type: array
        items: string
      events_learned:
        type: array
        items: string
      prayers_completed:
        type: array
        items: string

      # Stats
      trivia_stats:
        type: TriviaStats
      achievements:
        type: array
        items: Achievement

      # Engagement
      total_time_minutes:
        type: integer
        default: 0
      last_activity_at:
        type: datetime

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  TriviaStats:
    description: "Aggregated trivia statistics"
    properties:
      questions_answered:
        type: integer
        default: 0
      correct_answers:
        type: integer
        default: 0
      accuracy_percent:
        type: number
        computed: "(correct_answers / questions_answered) * 100"
      total_points:
        type: integer
        default: 0
      best_streak:
        type: integer
        default: 0
      games_played:
        type: integer
        default: 0

  Achievement:
    description: "Learning achievement badge"
    properties:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      description:
        type: string
      icon:
        type: string
      earned_at:
        type: datetime
        required: true

# ---------------------------------------------------------------------------
  # 17. VIDEO CONTENT - Teaching videos, animated stories
  # ---------------------------------------------------------------------------

  VideoContent:
    description: "Video content for Bible learning"
    properties:
      id:
        type: string
        required: true
      title:
        type: string
        required: true
      description:
        type: string
        maxLength: 1000

      # Classification
      video_type:
        type: VideoType
        required: true
      suitable_for:
        type: array
        items: AgeGroup
        required: true
      topics:
        type: array
        items: StudyTopic

      # Media
      video_url:
        type: string
        format: uri
        required: true
      thumbnail_url:
        type: string
        format: uri
      duration_seconds:
        type: integer
        required: true

      # Related content
      related_person_id:
        type: string
      related_location_id:
        type: string
      related_event_id:
        type: string
      scripture_refs:
        type: array
        items: ScriptureRef

      # Metadata
      source:
        type: string
        description: "Provider or creator"
      series_id:
        type: string
        description: "Part of a series"
      episode_number:
        type: integer

      # Stats
      view_count:
        type: integer
        default: 0
      like_count:
        type: integer
        default: 0

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 18. AUDIO CONTENT - Podcasts, music, stories
  # ---------------------------------------------------------------------------

  AudioContent:
    description: "Audio content beyond narration (music, podcasts, stories)"
    properties:
      id:
        type: string
        required: true
      title:
        type: string
        required: true
      description:
        type: string

      # Classification
      audio_type:
        type: AudioType
        required: true
      suitable_for:
        type: array
        items: AgeGroup
        required: true
      topics:
        type: array
        items: StudyTopic

      # Media
      audio_url:
        type: string
        format: uri
        required: true
      cover_image_url:
        type: string
        format: uri
      duration_seconds:
        type: integer
        required: true

      # Related content
      scripture_refs:
        type: array
        items: ScriptureRef
      lyrics:
        type: string
        description: "For songs"
      transcript:
        type: string
        description: "For podcasts/stories"

      # Series info
      series_id:
        type: string
      episode_number:
        type: integer

      # Artist/creator
      artist:
        type: string
      album:
        type: string

      # Stats
      play_count:
        type: integer
        default: 0
      like_count:
        type: integer
        default: 0

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 19. MEDIA PLAYLIST - Collections of videos/audio
  # ---------------------------------------------------------------------------

  MediaPlaylist:
    description: "Curated playlist of videos or audio"
    properties:
      id:
        type: string
        required: true
      title:
        type: string
        required: true
      description:
        type: string

      # Classification
      media_type:
        type: MediaType
        required: true
        description: "Video or Audio"
      playlist_type:
        type: PlaylistType
        required: true
      suitable_for:
        type: array
        items: AgeGroup

      # Content
      items:
        type: array
        items: PlaylistItem
        required: true
      total_duration_seconds:
        type: integer

      # Visual
      cover_image_url:
        type: string
        format: uri

      # Ownership
      owner_id:
        type: string
        description: "User who created (if user-created)"
      is_system:
        type: boolean
        default: true
        description: "System-curated vs user-created"

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  PlaylistItem:
    description: "An item in a playlist"
    properties:
      sequence:
        type: integer
        required: true
      media_type:
        type: MediaType
        required: true
      media_id:
        type: string
        required: true
        description: "VideoContent or AudioContent ID"
      notes:
        type: string

  # ---------------------------------------------------------------------------
  # 20. COMMUNITY NEED - Prayer requests and needs
  # ---------------------------------------------------------------------------

  CommunityNeed:
    description: "A need shared with the community for prayer/support"
    properties:
      id:
        type: string
        required: true
      author_id:
        type: string
        required: true

      # Content
      title:
        type: string
        required: true
        maxLength: 200
      description:
        type: string
        required: true
        maxLength: 2000
      need_type:
        type: NeedType
        required: true

      # Status
      status:
        type: NeedStatus
        required: true
        default: Active
      urgency:
        type: Urgency
        default: Normal

      # Privacy
      visibility:
        type: NeedVisibility
        required: true
        default: Community
      is_anonymous:
        type: boolean
        default: false

      # Location (optional)
      location:
        type: string
        description: "City/region for local needs"

      # Responses
      prayer_count:
        type: integer
        default: 0
        description: "Number of people praying"
      response_count:
        type: integer
        default: 0
      responses:
        type: array
        items: NeedResponse

      # Fulfillment
      fulfilled_at:
        type: datetime
      fulfillment_notes:
        type: string

      expires_at:
        type: datetime
        description: "When the need expires"

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  NeedResponse:
    description: "Response to a community need"
    properties:
      id:
        type: string
        required: true
      user_id:
        type: string
        required: true
      response_type:
        type: NeedResponseType
        required: true
      message:
        type: string
        maxLength: 1000
      is_anonymous:
        type: boolean
        default: false
      created_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 21. GIVING CAMPAIGN - Donation campaigns
  # ---------------------------------------------------------------------------

  GivingCampaign:
    description: "A fundraising or giving campaign"
    properties:
      id:
        type: string
        required: true
      title:
        type: string
        required: true
      description:
        type: string
        required: true
        maxLength: 5000

      # Classification
      campaign_type:
        type: CampaignType
        required: true
      category:
        type: GivingCategory
        required: true

      # Goals
      goal_amount:
        type: number
        description: "Target amount in cents"
      current_amount:
        type: number
        default: 0
      donor_count:
        type: integer
        default: 0

      # Timing
      start_date:
        type: date
        required: true
      end_date:
        type: date
      is_ongoing:
        type: boolean
        default: false

      # Status
      status:
        type: CampaignStatus
        required: true
        default: Active

      # Media
      cover_image_url:
        type: string
        format: uri
      video_url:
        type: string
        format: uri

      # Organization
      organization_name:
        type: string
      organization_url:
        type: string
        format: uri
      is_verified:
        type: boolean
        default: false

      # Updates
      updates:
        type: array
        items: CampaignUpdate

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  CampaignUpdate:
    description: "Progress update for a campaign"
    properties:
      id:
        type: string
        required: true
      title:
        type: string
        required: true
      content:
        type: string
        required: true
      image_url:
        type: string
        format: uri
      posted_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 22. DONATION - Individual donation record
  # ---------------------------------------------------------------------------

  Donation:
    description: "A donation to a campaign or general giving"
    properties:
      id:
        type: string
        required: true
      user_id:
        type: string
        required: true
      campaign_id:
        type: string
        description: "If for a specific campaign"

      # Amount
      amount:
        type: number
        required: true
        description: "Amount in cents"
      currency:
        type: string
        default: "USD"

      # Type
      donation_type:
        type: DonationType
        required: true
      is_recurring:
        type: boolean
        default: false
      recurring_frequency:
        type: RecurringFrequency

      # Privacy
      is_anonymous:
        type: boolean
        default: false
      display_name:
        type: string
        description: "Name to show if not anonymous"

      # Message
      message:
        type: string
        maxLength: 500

      # Status
      status:
        type: DonationStatus
        required: true
        default: Completed

      # Payment
      payment_method:
        type: string
        description: "Last 4 digits or type"
      transaction_id:
        type: string

      created_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 23. USER GIVING SUMMARY - Aggregate giving stats
  # ---------------------------------------------------------------------------

  UserGivingSummary:
    description: "User's giving history and stats"
    properties:
      user_id:
        type: string
        required: true

      # Totals
      total_given:
        type: number
        default: 0
        description: "Lifetime total in cents"
      this_year_given:
        type: number
        default: 0
      this_month_given:
        type: number
        default: 0
      donation_count:
        type: integer
        default: 0

      # Recurring
      active_recurring:
        type: array
        items: RecurringGift

      # Preferences
      preferred_causes:
        type: array
        items: GivingCategory

      # Streaks
      giving_streak_months:
        type: integer
        default: 0

      updated_at:
        type: datetime
        required: true

  RecurringGift:
    description: "Active recurring donation"
    properties:
      id:
        type: string
        required: true
      campaign_id:
        type: string
      amount:
        type: number
        required: true
      frequency:
        type: RecurringFrequency
        required: true
      next_date:
        type: date
        required: true
      status:
        type: string
        default: "active"

  # ---------------------------------------------------------------------------
  # 24. CHURCH - Local church directory entry
  # ---------------------------------------------------------------------------

  Church:
    description: "A local church in the directory"
    properties:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      denomination:
        type: ChurchDenomination

      # Contact
      address:
        type: string
        required: true
      city:
        type: string
        required: true
      state:
        type: string
      zip_code:
        type: string
      country:
        type: string
        default: "US"
      phone:
        type: string
      email:
        type: string
        format: email
      website:
        type: string
        format: uri

      # Location
      coordinates:
        type: GeoPoint
      distance_miles:
        type: number
        description: "Calculated from user location"

      # Services
      service_times:
        type: array
        items: ServiceTime
      has_childrens_ministry:
        type: boolean
        default: false
      has_youth_group:
        type: boolean
        default: false
      has_nursery:
        type: boolean
        default: false

      # Style/culture
      worship_style:
        type: WorshipStyle
      church_size:
        type: ChurchSize
      languages:
        type: array
        items: string
        default: ["English"]

      # Media
      logo_url:
        type: string
        format: uri
      cover_image_url:
        type: string
        format: uri

      # Verification
      is_verified:
        type: boolean
        default: false
      claimed_by_user_id:
        type: string
        description: "Church admin who claimed this listing"

      # Stats
      member_count:
        type: integer
      rating:
        type: number
        description: "Average rating 1-5"
      review_count:
        type: integer
        default: 0

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  ServiceTime:
    description: "A scheduled service time"
    properties:
      day:
        type: DayOfWeek
        required: true
      time:
        type: string
        required: true
        description: "HH:MM format"
      service_type:
        type: ServiceType
        required: true
      name:
        type: string
        description: "e.g., 'Contemporary Service'"

  # ---------------------------------------------------------------------------
