  # ---------------------------------------------------------------------------

  SupportGroup:
    description: "Support/recovery group (AA, grief, divorce, etc.)"
    properties:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      group_type:
        type: SupportGroupType
        required: true
      description:
        type: string

      # Meeting info
      meeting_frequency:
        type: MeetingFrequency
        required: true
      meeting_day:
        type: DayOfWeek
      meeting_time:
        type: string
        description: "HH:MM format"
      meeting_duration_minutes:
        type: integer
        default: 60

      # Location
      is_virtual:
        type: boolean
        default: false
      virtual_link:
        type: string
        format: uri
      location_name:
        type: string
        description: "e.g., 'First Baptist Church - Room 201'"
      address:
        type: string
      city:
        type: string
      state:
        type: string
      coordinates:
        type: GeoPoint

      # Contact
      contact_name:
        type: string
      contact_email:
        type: string
        format: email
      contact_phone:
        type: string

      # Demographics
      target_audience:
