  # 32. SCENE CHARACTER IMAGE - Character placement in a scene
  # ---------------------------------------------------------------------------

  SceneCharacterImage:
    description: "Character image placement in a scene"
    properties:
      character_id:
        type: string
        description: "Biblical character ID or custom"
      image_url:
        type: string
        format: uri
        required: true
      position_x:
        type: number
        description: "0-100 percent from left"
      position_y:
        type: number
        description: "0-100 percent from top"
      scale:
        type: number
        default: 1.0
      is_speaking:
        type: boolean
        default: false

  # ---------------------------------------------------------------------------
  # 33. STORY TEMPLATE - Pre-made templates for story creation
  # ---------------------------------------------------------------------------

  StoryTemplate:
    description: "Pre-made template for creating stories"
    properties:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      description:
        type: string
      thumbnail_url:
        type: string
        format: uri

      # Classification
      template_type:
        type: TemplateType
        required: true
      target_age:
        type: AgeGroup
      difficulty:
        type: Difficulty
        description: "How complex to customize"

      # Content
      scene_count:
        type: integer
        required: true
      sample_scenes:
        type: array
        items: StoryScene

      # Assets included
      background_options:
        type: array
        items: string
        description: "URLs to background images"
      character_options:
        type: array
        items: string
        description: "Character IDs available"

      # Stats
      uses_count:
        type: integer
        default: 0

      is_premium:
        type: boolean
        default: false
      is_active:
        type: boolean
        default: true

      created_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 34. STORY ASSET - User-uploaded media for stories
  # ---------------------------------------------------------------------------

  StoryAsset:
    description: "User-uploaded or generated asset for stories"
    properties:
      id:
        type: string
        required: true
      owner_id:
        type: string
        required: true

      # Asset info
      asset_type:
        type: StoryAssetType
        required: true
      name:
        type: string
        required: true
      file_url:
        type: string
        format: uri
        required: true
      thumbnail_url:
        type: string
        format: uri

      # Metadata
      file_size_bytes:
        type: integer
      mime_type:
        type: string
      width:
        type: integer
        description: "For images"
      height:
        type: integer
        description: "For images"
      duration_seconds:
        type: integer
        description: "For audio/video"

      # AI-generated
      is_ai_generated:
        type: boolean
        default: false
      generation_prompt:
        type: string
        description: "Prompt used if AI-generated"

      # Permissions
      is_public:
        type: boolean
        default: false
        description: "Can others use this asset"

      created_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 35. STORY SHARE - Sharing record for stories
  # ---------------------------------------------------------------------------

  StoryShare:
    description: "Record of story being shared"
    properties:
      id:
        type: string
        required: true
      story_id:
        type: string
        required: true
      sharer_id:
        type: string
        required: true

      # Share method
      share_type:
        type: ShareType
        required: true
      recipient_id:
        type: string
        description: "If shared to specific user"
      recipient_email:
        type: string
        format: email
        description: "If shared via email"

      # Message
      message:
        type: string
        maxLength: 500

      # Tracking
      was_viewed:
        type: boolean
        default: false
      viewed_at:
        type: datetime

      shared_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 36. STORY REACTION - Community reactions to stories
  # ---------------------------------------------------------------------------

  StoryReaction:
    description: "User reaction to a story (like, comment, etc.)"
    properties:
      id:
        type: string
        required: true
      story_id:
        type: string
        required: true
      user_id:
        type: string
        required: true

      reaction_type:
        type: StoryReactionType
        required: true

      # For comments
      comment_text:
        type: string
        maxLength: 1000
      parent_reaction_id:
        type: string
        description: "For reply threads"

      # Moderation
      is_hidden:
        type: boolean
        default: false

      created_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 37. SAVED STORY - User's saved/bookmarked stories
  # ---------------------------------------------------------------------------

  SavedStory:
    description: "User's saved story from showcase"
    properties:
      id:
        type: string
        required: true
      user_id:
        type: string
        required: true
      story_id:
        type: string
        required: true

      # Organization
      collection_id:
        type: string
        description: "Optional: add to collection"
      notes:
        type: string
        maxLength: 500

      saved_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 38. STORY COLLECTION - User's collection of stories
  # ---------------------------------------------------------------------------

  StoryCollection:
    description: "User-created collection of stories"
    properties:
      id:
        type: string
        required: true
      owner_id:
        type: string
        required: true

      name:
        type: string
        required: true
        maxLength: 100
      description:
        type: string
        maxLength: 500
      cover_image_url:
        type: string
        format: uri

      # Content
      story_ids:
        type: array
        items: string
      story_count:
        type: integer
        default: 0

      # Visibility
      visibility:
        type: StoryVisibility
        default: Private

      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 39. STORY PROGRESS - Track user's story viewing progress
  # ---------------------------------------------------------------------------

  StoryProgress:
    description: "User's progress through a story"
    properties:
      id:
        type: string
        required: true
      user_id:
        type: string
        required: true
      story_id:
        type: string
        required: true

      # Progress
      current_scene:
        type: integer
        default: 1
      total_scenes:
        type: integer
        required: true
      percent_complete:
        type: integer
        default: 0

      # Completion
      is_completed:
        type: boolean
        default: false
      completed_at:
        type: datetime

      # Time tracking
      time_spent_seconds:
        type: integer
        default: 0

      # Quiz scores if applicable
      quiz_score:
        type: integer
      quiz_total:
        type: integer

      started_at:
        type: datetime
        required: true
      last_viewed_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # 40. SHOWCASE ITEM - Featured story in the showcase
  # ---------------------------------------------------------------------------

  ShowcaseItem:
    description: "Featured story in the community showcase"
    properties:
      id:
        type: string
        required: true
      story_id:
        type: string
        required: true

      # Feature settings
      feature_type:
        type: FeatureType
        required: true
      position:
        type: integer
        description: "Display order"

      # Display
      headline:
        type: string
        maxLength: 100
      tagline:
        type: string
        maxLength: 200

      # Schedule
      start_date:
        type: datetime
        required: true
      end_date:
        type: datetime

      is_active:
        type: boolean
        default: true

      created_at:
        type: datetime
        required: true

