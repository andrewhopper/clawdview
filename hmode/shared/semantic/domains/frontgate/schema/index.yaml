# Frontgate Domain Index
# Self-organizing file system gatekeeper

domain:
  name: frontgate
  version: "1.0.0"
  status: development
  description: |
    Self-organizing file system gatekeeper with deterministic rules.
    Enforces file organization policies, quarantines violations, and
    learns rules from user decisions via triage workflows.

  dependencies:
    - observer: "^1.0.0"    # Rule, Violation, CheckResult
    - human-task: "^1.2.0"  # Task, TaskDecision, ReviewCase patterns
    - core: "^1.0.0"        # Entity base
    - events: "^1.0.0"      # DomainEvent for daemon
    - gesture: "^1.0.0"     # SwipeDirection for UI bindings

  use_cases:
    - File organization enforcement in monorepos
    - Quarantine and triage for AI-generated files
    - Learning file placement rules from user decisions
    - Git pre-commit hook integration
    - Daemon-based real-time monitoring

  created_at: "2025-12-01"
  updated_at: "2025-12-02"

schema:
  enums: enums.yaml
  value_objects: value-objects.yaml
  entities: entities.yaml

exports:
  # Value Objects
  - File
  - FileScope
  - Destination
  - AutoFix
  - FileTriageInput
  - TriageGestureBinding

  # Entities
  - FileRule
  - QuarantineEntry
  - FileTriage
  - TriageSession

  # Events
  - FileCreatedEvent
  - FileViolationEvent
  - FileQuarantinedEvent
  - FileTriageCompletedEvent
  - RuleLearnedEvent

  # Enums
  - AutoFixType
  - QuarantineReason
  - EventSource
  - Resolution
  - OperatingMode

  # Actions
  - CheckFile
  - ScanDirectory
  - QuarantineFile
  - StartTriageSession
  - SubmitTriageDecision
  - LearnRule
