# =============================================================================
# SCORING RUBRIC
# =============================================================================

scoring_rubric:
  description: |
    Use this rubric to score each capsule field.
    Score 1-5 for each criterion, then average.

  criteria:
    clarity:
      weight: 30
      description: "Can a non-technical person understand this?"
      scores:
        5: "A high schooler would understand"
        4: "A college graduate would understand"
        3: "Requires some business context"
        2: "Requires industry knowledge"
        1: "Requires technical expertise"

    specificity:
      weight: 25
      description: "Is this concrete and specific?"
      scores:
        5: "Paints a vivid picture with specific details"
        4: "Clear and concrete"
        3: "Somewhat generic but understandable"
        2: "Vague or abstract"
        1: "Could apply to almost anything"

    benefit_focus:
      weight: 25
      description: "Does this focus on user benefit?"
      scores:
        5: "Entirely focused on what user gains"
        4: "Mostly benefit-focused"
        3: "Mix of features and benefits"
        2: "Mostly feature-focused"
        1: "Entirely technical/feature description"

    brevity:
      weight: 20
      description: "Is this concise?"
      scores:
        5: "Every word earns its place"
        4: "Tight with minor trim possible"
        3: "Some unnecessary words"
        2: "Noticeably verbose"
        1: "Needs significant editing"

  passing_score: 3.5
  excellent_score: 4.5

# =============================================================================
# LLM JUDGE PROMPT
# =============================================================================

llm_judge_prompt: |
  You are evaluating a Project Capsule for executive readability.

  TARGET READER: An executive with an MBA who has NO technical background.
  They should understand this in 30 seconds.

  EVALUATE each field against these criteria:

  1. CLARITY (25%): Can a non-technical person understand this?
  2. SPECIFICITY (20%): Is this concrete, not vague?
  3. BENEFIT FOCUS (25%): Does this explain user value, not technical features?
  4. BREVITY (15%): Is every word necessary?
  5. FRAMEWORK ALIGNMENT (15%): Does it follow human-centered design principles?

  FRAMEWORK CHECKLIST (for criterion 5):
  □ Golden Circle: Does uvp communicate WHY, not just WHAT?
  □ Jobs to Be Done: Is customer defined by job/situation, not demographics?
  □ Self-Determination Theory: Does outcome address autonomy, competence, or relatedness?
  □ Fogg Behavior Model: Is solution easy enough given the motivation level?
  □ Kahneman System 1: Does uvp work for fast, intuitive thinking?

  FAIL immediately if:
  - Technical jargon appears in customer/problem/solution/uvp fields
  - The reader needs to know programming to understand
  - Benefits are stated as features
  - Core benefit lacks an outcome clause ("so that...")
  - Data claims have no citations

  PROVIDE:
  1. Overall score (1-5)
  2. Pass/Fail (3.5 minimum to pass)
  3. Field-by-field feedback
  4. Framework alignment notes
  5. Specific rewrite suggestions for failing fields

  FORMAT your response as:
  ```yaml
  overall_score: X.X
  pass: true/false

  field_scores:
    customer:
      score: X
      feedback: "..."
      rewrite: "..." (if needed)
    problem:
      score: X
      feedback: "..."
      rewrite: "..."
    core_benefit:
      score: X
      feedback: "..."
      outcome_type: "autonomy|competence|relatedness|safety|simplicity|possibility"
      rewrite: "..."
    # etc.

  framework_alignment:
    golden_circle: "pass/fail - notes"
    jobs_to_be_done: "pass/fail - notes"
    self_determination: "pass/fail - which need addressed"
    behavior_model: "pass/fail - motivation/ability balance"
    system_1: "pass/fail - intuitive appeal"

  summary: "One paragraph overall assessment"
  ```

# =============================================================================
# EXAMPLES: BEFORE/AFTER REWRITES
# =============================================================================

rewrite_examples:

  - field: customer
    before: "DevOps engineers managing Kubernetes clusters"
    after: "Teams who want their software updates to go live faster and safer"
    explanation: "Focus on what they WANT, not their job title"

  - field: problem
    before: "Lack of observability into distributed systems causes increased MTTR"
    after: "When something breaks, it takes hours to find the problem because you can't see what's happening inside your software"
    explanation: "Describe the FEELING and CONSEQUENCE, not the technical gap"

  - field: solution
    before: "Real-time distributed tracing with automatic instrumentation"
    after: "See exactly where problems happen, automatically, without changing your code"
    explanation: "Focus on what the USER experiences"

  - field: uvp
    before: "Cloud-native observability platform with AI-powered root cause analysis"
    after: "Find problems in seconds, not hours"
    explanation: "Remove jargon, focus on the outcome"

  - field: alternatives
    before:
      name: "Datadog"
      gap: "No native OpenTelemetry support"
    after:
      name: "Existing monitoring tools"
      gap: "Expensive and still take hours to pinpoint issues"
    explanation: "Replace product names with categories, gaps with user impact"
