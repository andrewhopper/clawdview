# Claude Code Session Domain Model
# Local JSONL session file format for Claude Code conversations
# Source: Claude Code ~/.claude/projects/ session storage

domain:
  name: claude-code-session
  version: "1.0.0"
  description: Claude Code local session storage format - JSONL event stream with metadata
  dependencies: [core, llm-conversation, llm-message, llm-participant]
  sources:
    - "Claude Code session storage: ~/.claude/projects/{project}/{session-uuid}.jsonl"
    - "Claude Code version 2.0.50+"
  created_at: "2025-11-24"
  updated_at: "2025-11-24"

entities:

  SessionFile:
    description: A JSONL file containing a Claude Code session
    properties:
      filePath: { type: string, required: true, description: "Absolute path to .jsonl file" }
      sessionUuid: { type: string, required: true, description: "UUID identifying this session" }
      projectPath: { type: string, required: true, description: "Project directory path" }
      eventCount: { type: integer, default: 0 }
      startedAt: { type: datetime, required: true }
      lastEventAt: { type: datetime }
      fileSize: { type: integer, description: "File size in bytes" }
      createdAt: { type: datetime, required: true }
      updatedAt: { type: datetime, required: true }

  SessionEvent:
    description: A single event in the JSONL session stream
    properties:
      uuid: { type: string, required: true, description: "Unique message ID" }
      parentUuid: { type: string, description: "Previous message ID for threading" }
      sessionId: { type: string, required: true, description: "Links to previous session for continuity" }
      type: { type: EventType, required: true }
      timestamp: { type: datetime, required: true }
      version: { type: string, required: true, description: "Claude Code version" }
      userType: { type: string, description: "external, internal" }
      metadata: { type: EventMetadata, required: true }
      message: { type: EventMessage }
      requestId: { type: string, description: "API request ID for assistant messages" }

  EventMetadata:
    description: Contextual metadata for each event
    properties:
      cwd: { type: string, required: true, description: "Working directory at event time" }
      gitBranch: { type: string, description: "Active git branch" }
      isSidechain: { type: boolean, default: false, description: "Whether event is in a sidechain" }

  EventMessage:
    description: Message content within an event (polymorphic based on event type)
    properties:
      role: { type: string, description: "user, assistant, system" }
      content: { type: any, description: "String for user text, array of ContentBlock for assistant" }
      id: { type: string, description: "Message ID for assistant messages" }
      model: { type: string, description: "Model ID for assistant messages" }
      stopReason: { type: string, description: "end_turn, tool_use, etc." }
      stopSequence: { type: string }
      usage: { type: TokenUsage, description: "Token usage for assistant messages" }

  TokenUsage:
    description: Token consumption tracking for assistant messages
    properties:
      inputTokens: { type: integer, required: true }
      outputTokens: { type: integer, required: true }
      cacheCreationInputTokens: { type: integer, default: 0 }
      cacheReadInputTokens: { type: integer, default: 0 }
      cacheCreation: { type: CacheCreationDetail }
      serviceTier: { type: string, description: "standard, premium, etc." }

  CacheCreationDetail:
    description: Breakdown of cache creation by TTL tier
    properties:
      ephemeral5mInputTokens: { type: integer, default: 0, description: "5-minute ephemeral cache" }
      ephemeral1hInputTokens: { type: integer, default: 0, description: "1-hour ephemeral cache" }

  ContentBlock:
    description: A block of content in assistant messages
    properties:
      type: { type: ContentBlockType, required: true }
      text: { type: string, description: "For text content" }
      thinking: { type: string, description: "For thinking content (encrypted)" }
      signature: { type: string, description: "Signature for thinking content" }
      name: { type: string, description: "Tool name for tool_use" }
      id: { type: string, description: "Tool use ID" }
      input: { type: object, description: "Tool input parameters" }
      toolUseId: { type: string, description: "For tool_result content" }

  UserMessage:
    description: User message event (type=user)
    extends: SessionEvent
    properties:
      message:
        role: { type: string, enum: [user], required: true }
        content: { type: any, description: "String or array of tool results" }

  AssistantMessage:
    description: Assistant message event (type=assistant)
    extends: SessionEvent
    properties:
      message:
        role: { type: string, enum: [assistant], required: true }
        id: { type: string, required: true }
        model: { type: string, required: true }
        content: { type: array, items: ContentBlock }
        stopReason: { type: string }
        usage: { type: TokenUsage, required: true }

  SystemMessage:
    description: System-level event (type=system)
    extends: SessionEvent
    properties:
      message: { type: object, description: "System event payload" }

  QueueOperation:
    description: Background queue operation event (type=queue-operation)
    extends: SessionEvent
    properties:
      message: { type: object, description: "Queue operation details" }

  MessageThread:
    description: A thread of related messages via UUID linking
    properties:
      messages: { type: array, items: string, description: "UUIDs in thread order" }
      rootUuid: { type: string, required: true, description: "First message UUID" }
      leafUuid: { type: string, required: true, description: "Last message UUID" }
      depth: { type: integer, required: true, description: "Number of messages" }

  SessionSnapshot:
    description: A point-in-time snapshot of shell state
    properties:
      timestamp: { type: datetime, required: true }
      snapshotFile: { type: string, required: true, description: "Path to snapshot .sh file" }
      shellType: { type: string, default: "bash" }
      fileSize: { type: integer }

  ProjectSession:
    description: Aggregated view of all sessions for a project
    properties:
      projectPath: { type: string, required: true }
      sessionFiles: { type: array, items: SessionFile }
      totalEvents: { type: integer, default: 0 }
      firstSessionAt: { type: datetime }
      lastSessionAt: { type: datetime }

enums:

  EventType:
    description: Type of event in session stream
    values:
      - user: "User input message"
      - assistant: "Assistant response message"
      - system: "System-level event"
      - queue-operation: "Background queue operation"

  ContentBlockType:
    description: Type of content block in assistant messages
    values:
      - text: "Plain text response"
      - thinking: "Internal reasoning (encrypted)"
      - tool_use: "Tool/function invocation"
      - tool_result: "Result from tool execution"

actions:
  ReadSessionFile:
    description: Read and parse a JSONL session file
    input:
      filePath: { type: string, required: true }
    output:
      session: { type: SessionFile }
      events: { type: array, items: SessionEvent }

  GetEventsByType:
    description: Filter events by type
    input:
      sessionFile: { type: SessionFile, required: true }
      eventType: { type: EventType, required: true }
    output:
      events: { type: array, items: SessionEvent }

  GetMessageThread:
    description: Build a thread of messages from UUID links
    input:
      sessionFile: { type: SessionFile, required: true }
      rootUuid: { type: string, required: true }
    output:
      thread: { type: MessageThread }

  GetTokenUsage:
    description: Calculate total token usage for session
    input:
      sessionFile: { type: SessionFile, required: true }
    output:
      totalInputTokens: { type: integer }
      totalOutputTokens: { type: integer }
      cacheCreationTokens: { type: integer }
      cacheReadTokens: { type: integer }

  ListProjectSessions:
    description: List all session files for a project
    input:
      projectPath: { type: string, required: true }
    output:
      projectSession: { type: ProjectSession }
