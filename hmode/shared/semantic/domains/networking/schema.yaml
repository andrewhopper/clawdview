# Networking Domain Schema
# Version: 0.3.0 (Draft - Awaiting Approval)
# Purpose: Model TCP/IP networks, devices, access interfaces, and dependencies
# Use Case: Network documentation generation
# Features:
#   - Abstract secret management (provider-agnostic: 1Password, Vault, Bitwarden, etc.)
#   - Physical location tracking (Site → Building → Room → Rack → Device)
#   - Device dependencies (controller → managed devices)
#   - Access interfaces (web UI, SSH, API, mobile app, cloud portal)
#   - Decomposed routing (RouteTable → Route)
#   - Decomposed stateless firewall (NetworkACL → NetworkACLEntry)
#   - WiFi/802.11 wireless networks
#   - Link Aggregation (LAG/Port-channel/802.3ad)
#   - DNS zone hierarchy (DNSZone → DNSRecord)
#   - AWS VPC extension (VPC, IGW, NAT, Peering, Transit Gateway)

domain: networking
version: "0.3.0"
status: draft
description: |
  Computer networking domain for modeling TCP/IP infrastructure.
  Supports network documentation, access reference, dependency mapping.
owner: platform
dependencies:
  - core

# =============================================================================
# ENUMS
# =============================================================================

enums:
  DeviceType:
    description: Type of network device
    values:
      # Infrastructure
      - router
      - switch
      - access_point
      - firewall
      - load_balancer
      - gateway
      - modem
      - bridge
      # Compute
      - server
      - workstation
      - laptop
      - mobile
      - tablet
      - virtual_machine
      - container
      # Storage
      - nas
      - san
      # Security
      - ip_camera
      - nvr
      - dvr
      - doorbell_camera
      - access_control_panel
      # Smart Home
      - smart_hub
      - smart_thermostat
      - smart_lock
      - smart_light
      - smart_plug
      - smart_speaker
      - smart_display
      # IoT
      - iot_sensor
      - iot_actuator
      - iot_gateway
      # Peripherals
      - printer
      - scanner
      - voip_phone
      # Entertainment
      - gaming_console
      - streaming_device
      - smart_tv
      - media_server
      # Other
      - other

  AccessProtocol:
    description: Protocol for accessing/managing a device
    values:
      - web_http
      - web_https
      - ssh
      - telnet
      - rdp
      - vnc
      - snmp_v1
      - snmp_v2c
      - snmp_v3
      - api_rest
      - api_graphql
      - api_soap
      - console_serial
      - console_usb
      - mobile_app
      - cloud_portal
      - winrm
      - powershell_remoting

  CredentialType:
    description: Type of authentication credential
    values:
      - username_password
      - ssh_key_password
      - ssh_key_only
      - api_token
      - api_key
      - certificate
      - oauth2
      - saml
      - mfa_totp
      - mfa_sms
      - radius
      - ldap
      - active_directory
      - local_only

  IPVersion:
    description: IP protocol version
    values:
      - ipv4
      - ipv6
      - dual_stack

  Protocol:
    description: Network protocol
    values:
      - tcp
      - udp
      - icmp
      - icmpv6
      - gre
      - esp
      - ah
      - sctp
      - any

  RuleAction:
    description: Firewall rule action
    values:
      - allow
      - deny
      - reject
      - drop
      - log
      - log_allow
      - log_deny

  ConnectionState:
    description: Device connection state
    values:
      - online
      - offline
      - degraded
      - rebooting
      - updating
      - provisioning
      - unknown

  ManagementType:
    description: Type of management relationship
    values:
      - controller          # Ubiquiti controller -> APs
      - hypervisor          # ESXi/Proxmox -> VMs
      - container_host      # Docker host -> containers
      - orchestrator        # Kubernetes -> pods
      - stack_primary       # Primary in switch stack
      - stack_member        # Member in switch stack
      - mesh_root           # Mesh network root
      - mesh_node           # Mesh network node
      - monitoring_server   # Nagios/PRTG -> monitored
      - backup_server       # Backup server -> clients
      - directory_server    # AD/LDAP -> domain members

  DependencyType:
    description: Type of dependency between devices
    values:
      - requires            # Hard dependency, won't function without
      - uses                # Soft dependency, degraded without
      - backup_for          # Failover/redundancy
      - upstream            # Network path dependency
      - power_source        # PoE or UPS dependency

  DHCPMode:
    description: DHCP configuration mode
    values:
      - static
      - dhcp
      - dhcp_reservation
      - slaac              # IPv6 stateless
      - dhcpv6

  VLANType:
    description: VLAN purpose/type
    values:
      - native
      - management
      - data
      - voice
      - guest
      - iot
      - security
      - dmz
      - storage
      - backup

  PortState:
    description: Physical port state
    values:
      - up
      - down
      - admin_down
      - err_disabled
      - not_connected

  DNSRecordType:
    description: DNS record types
    values:
      - A
      - AAAA
      - CNAME
      - MX
      - TXT
      - PTR
      - SRV
      - NS
      - SOA
      - CAA

  VPNType:
    description: VPN configuration type
    values:
      - site_to_site
      - client_to_site
      - ssl_vpn
      - ipsec
      - wireguard
      - openvpn
      - l2tp
      - pptp

  # ---------------------------------------------------------------------------
  # Routing
  # ---------------------------------------------------------------------------

  RouteTargetType:
    description: Type of route destination/target
    values:
      - local                 # Local VPC/network
      - internet_gateway      # IGW
      - nat_gateway           # NAT gateway
      - virtual_private_gateway  # VPN gateway
      - transit_gateway       # Transit gateway
      - vpc_peering           # VPC peering connection
      - network_interface     # ENI
      - instance              # EC2 instance
      - egress_only_gateway   # IPv6 egress-only
      - carrier_gateway       # Wavelength carrier gateway
      - local_gateway         # Outpost local gateway
      - gateway_load_balancer_endpoint  # GWLB endpoint
      - blackhole             # Drop traffic

  RouteState:
    description: Route status
    values:
      - active
      - blackhole             # Target unavailable
      - pending
      - deleted

  # ---------------------------------------------------------------------------
  # Network ACL (Stateless Firewall)
  # ---------------------------------------------------------------------------

  RuleType:
    description: Type of network rule
    values:
      - stateless             # Network ACL
      - stateful              # Security group / firewall

  TrafficDirection:
    description: Direction of network traffic
    values:
      - inbound
      - outbound
      - bidirectional

  # ---------------------------------------------------------------------------
  # Wireless/802.11
  # ---------------------------------------------------------------------------

  WirelessBand:
    description: WiFi radio band/frequency
    values:
      - band_2_4_ghz          # 2.4 GHz (802.11b/g/n/ax)
      - band_5_ghz            # 5 GHz (802.11a/n/ac/ax)
      - band_6_ghz            # 6 GHz (802.11ax/WiFi 6E)

  WirelessSecurityType:
    description: WiFi security protocol
    values:
      - open                  # No security
      - wep                   # WEP (deprecated)
      - wpa_personal          # WPA-PSK
      - wpa2_personal         # WPA2-PSK
      - wpa3_personal         # WPA3-SAE
      - wpa_enterprise        # WPA-802.1X
      - wpa2_enterprise       # WPA2-802.1X
      - wpa3_enterprise       # WPA3-802.1X
      - owe                   # Opportunistic Wireless Encryption

  ChannelWidth:
    description: WiFi channel bandwidth
    values:
      - width_20_mhz
      - width_40_mhz
      - width_80_mhz
      - width_160_mhz
      - width_320_mhz         # WiFi 7

  # ---------------------------------------------------------------------------
  # Link Aggregation (802.3ad)
  # ---------------------------------------------------------------------------

  LAGProtocol:
    description: Link aggregation protocol
    values:
      - lacp                  # 802.3ad LACP (dynamic)
      - static                # Static LAG (no negotiation)
      - pagp                  # Cisco PAgP (legacy)

  LAGMode:
    description: LACP mode
    values:
      - active                # Initiate LACP
      - passive               # Wait for LACP
      - on                    # Static, no LACP

  LAGState:
    description: LAG operational state
    values:
      - up
      - down
      - degraded              # Some members down

  # ---------------------------------------------------------------------------
  # AWS VPC
  # ---------------------------------------------------------------------------

  VPCState:
    description: VPC state
    values:
      - pending
      - available
      - unavailable

  AttachmentState:
    description: Attachment state (generic)
    values:
      - attaching
      - attached
      - detaching
      - detached
      - available
      - in_use
      - failed

  PeeringState:
    description: VPC peering connection state
    values:
      - initiating_request
      - pending_acceptance
      - active
      - deleted
      - rejected
      - failed
      - expired
      - provisioning
      - deleting

  # ---------------------------------------------------------------------------
  # AWS Transit Gateway
  # ---------------------------------------------------------------------------

  TransitGatewayState:
    description: Transit Gateway state
    values:
      - pending
      - available
      - modifying
      - deleting
      - deleted

  TransitGatewayAttachmentType:
    description: Type of Transit Gateway attachment
    values:
      - vpc
      - vpn
      - direct_connect_gateway
      - peering
      - connect
      - tgw_connect

  TransitGatewayAttachmentState:
    description: TGW attachment state
    values:
      - initiating
      - initiating_request
      - pending_acceptance
      - rolling_back
      - pending
      - available
      - modifying
      - deleting
      - deleted
      - failed
      - rejected
      - rejecting

  # ---------------------------------------------------------------------------
  # Secret Manager Integration
  # ---------------------------------------------------------------------------

  SecretStoreType:
    description: Type of external secret manager
    values:
      - onepassword           # 1Password
      - bitwarden             # Bitwarden
      - lastpass              # LastPass
      - hashicorp_vault       # HashiCorp Vault
      - aws_secrets_manager   # AWS Secrets Manager
      - aws_ssm               # AWS Systems Manager Parameter Store
      - azure_key_vault       # Azure Key Vault
      - gcp_secret_manager    # Google Cloud Secret Manager
      - cyberark              # CyberArk
      - keepass               # KeePass (local)
      - doppler               # Doppler
      - infisical             # Infisical
      - local_env             # Local environment variable
      - local_file            # Local file (encrypted)
      - manual                # Manual entry (not stored)

  SecretType:
    description: Type of secret being stored
    values:
      - password
      - ssh_private_key
      - ssh_public_key
      - api_key
      - api_token
      - bearer_token
      - certificate
      - private_key
      - psk                   # Pre-shared key
      - totp_seed             # TOTP seed for MFA
      - recovery_codes
      - passphrase
      - pin

  # ---------------------------------------------------------------------------
  # Physical Location
  # ---------------------------------------------------------------------------

  LocationType:
    description: Type of physical location
    values:
      - site                  # Campus, data center, office
      - building
      - floor
      - room
      - closet                # Network closet, server room
      - rack
      - shelf
      - desk
      - wall_mount
      - ceiling_mount
      - outdoor

  RackType:
    description: Type of equipment rack
    values:
      - full_rack             # 42U standard
      - half_rack             # 22U
      - quarter_rack          # 12U
      - wall_mount            # Wall-mounted enclosure
      - open_frame            # Open frame rack
      - cabinet               # Enclosed cabinet
      - desktop               # Desktop/shelf unit

# =============================================================================
# ENTITIES
# =============================================================================

entities:

  # ---------------------------------------------------------------------------
  # Secret Manager Integration (KEY FEATURE)
  # ---------------------------------------------------------------------------

  SecretStore:
    description: Configuration for an external secret manager
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
        description: "Friendly name (e.g., 'Home 1Password', 'Work Vault')"
      type:
        type: SecretStoreType
        required: true
      description:
        type: string
      vault_name:
        type: string
        description: "Vault/collection name within the store"
      base_url:
        type: string
        description: "For self-hosted (e.g., HashiCorp Vault URL)"
      account_id:
        type: string
        description: "Account identifier (e.g., 1Password account)"
      region:
        type: string
        description: "For cloud providers (e.g., us-east-1)"
      namespace:
        type: string
        description: "For namespaced stores (e.g., Vault namespace)"
      auth_method:
        type: string
        description: "How to authenticate (token, iam, ldap, etc.)"
      is_default:
        type: boolean
        default: false
        description: "Default store for new credentials"
      notes:
        type: string
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  SecretReference:
    description: Reference to a secret stored in an external secret manager
    fields:
      id:
        type: string
        required: true
      store_id:
        type: string
        ref: SecretStore
        required: true
        description: "Which secret store contains this secret"
      secret_type:
        type: SecretType
        required: true
      item_id:
        type: string
        description: "Unique item ID in the secret store"
      item_path:
        type: string
        description: "Path to secret (e.g., 'network/router-admin' for Vault)"
      item_title:
        type: string
        description: "Human-readable title in the store"
      field_name:
        type: string
        description: "Specific field within item (e.g., 'password', 'api_key')"
      version:
        type: string
        description: "Specific version (for versioned stores)"
      env_var_name:
        type: string
        description: "For local_env type - environment variable name"
      file_path:
        type: string
        description: "For local_file type - path to encrypted file"
      url:
        type: string
        description: "Direct URL to secret in manager's UI (for convenience)"
      last_rotated:
        type: datetime
        description: "When the secret was last rotated"
      rotation_policy:
        type: string
        description: "Rotation schedule (e.g., '90 days', 'manual')"
      notes:
        type: string
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # Physical Location (KEY FEATURE)
  # ---------------------------------------------------------------------------

  Site:
    description: Physical site (campus, data center, office, home)
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
        description: "Site name (e.g., 'Home', 'HQ Office', 'AWS us-east-1')"
      type:
        type: string
        description: "home, office, data_center, colo, cloud, branch"
      address:
        type: string
        description: "Physical address"
      city:
        type: string
      state:
        type: string
      country:
        type: string
      postal_code:
        type: string
      coordinates:
        type: GeoCoordinates
        description: "Lat/long for mapping"
      timezone:
        type: string
        description: "IANA timezone (e.g., 'America/New_York')"
      contact_name:
        type: string
        description: "Site contact person"
      contact_phone:
        type: string
      contact_email:
        type: string
      notes:
        type: string
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  GeoCoordinates:
    description: Geographic coordinates
    fields:
      latitude:
        type: number
        required: true
      longitude:
        type: number
        required: true

  Building:
    description: Building within a site
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      site_id:
        type: string
        ref: Site
        required: true
      address:
        type: string
        description: "If different from site address"
      floor_count:
        type: integer
      description:
        type: string
      notes:
        type: string
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  Room:
    description: Room, closet, or space within a building
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
        description: "Room name or number"
      building_id:
        type: string
        ref: Building
      site_id:
        type: string
        ref: Site
        description: "Direct site ref if no building hierarchy"
      floor:
        type: string
        description: "Floor number or name (e.g., '2', 'Basement', 'Mezzanine')"
      type:
        type: LocationType
        default: room
      purpose:
        type: string
        description: "server_room, network_closet, office, lab, etc."
      access_requirements:
        type: string
        description: "Key card, key, combo, badge + escort, etc."
      climate_controlled:
        type: boolean
        default: false
      has_ups:
        type: boolean
        default: false
      has_generator:
        type: boolean
        default: false
      max_power_watts:
        type: integer
        description: "Maximum power capacity"
      notes:
        type: string
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  Rack:
    description: Equipment rack or mounting location
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
        description: "Rack identifier (e.g., 'Rack-A1', 'Network Closet Shelf')"
      room_id:
        type: string
        ref: Room
      site_id:
        type: string
        ref: Site
        description: "Direct site ref if no room hierarchy"
      type:
        type: RackType
        default: full_rack
      total_units:
        type: integer
        description: "Total rack units (e.g., 42 for full rack)"
        default: 42
      available_units:
        type: integer
        description: "Currently available units"
      max_weight_kg:
        type: number
        description: "Maximum weight capacity"
      max_power_watts:
        type: integer
        description: "Maximum power capacity"
      has_pdu:
        type: boolean
        default: false
        description: "Has power distribution unit"
      pdu_outlets:
        type: integer
        description: "Number of PDU outlets"
      row:
        type: string
        description: "Row identifier in data center"
      position:
        type: string
        description: "Position in row"
      front_facing:
        type: string
        description: "Direction rack faces (N, S, E, W)"
      notes:
        type: string
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  DeviceLocation:
    description: Physical location assignment for a device
    fields:
      device_id:
        type: string
        ref: Device
        required: true
      site_id:
        type: string
        ref: Site
      building_id:
        type: string
        ref: Building
      room_id:
        type: string
        ref: Room
      rack_id:
        type: string
        ref: Rack
      rack_unit_start:
        type: integer
        description: "Starting rack unit (1 = bottom)"
      rack_unit_end:
        type: integer
        description: "Ending rack unit (for multi-U devices)"
      rack_side:
        type: string
        description: "front, rear"
      mount_type:
        type: LocationType
        description: "How device is mounted"
      position_description:
        type: string
        description: "Free-text position (e.g., 'Top shelf, left side')"
      notes:
        type: string

  # ---------------------------------------------------------------------------
  # Network Topology
  # ---------------------------------------------------------------------------

  Network:
    description: A logical network (typically a CIDR block)
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      description:
        type: string
      cidr:
        type: string
        description: "CIDR notation (e.g., 192.168.1.0/24)"
        required: true
      ip_version:
        type: IPVersion
        default: ipv4
      gateway:
        type: string
        description: Default gateway IP
      dns_servers:
        type: array
        items: string
      domain:
        type: string
        description: "DNS domain (e.g., home.local)"
      vlan_id:
        type: integer
        description: Associated VLAN ID
      purpose:
        type: string
        description: "Network purpose (e.g., IoT, Guest, Management)"
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  Subnet:
    description: Subdivision of a network
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      network_id:
        type: string
        ref: Network
        required: true
      cidr:
        type: string
        required: true
      gateway:
        type: string
      dhcp_enabled:
        type: boolean
        default: true
      dhcp_range_start:
        type: string
      dhcp_range_end:
        type: string
      reservations:
        type: array
        items: DHCPReservation
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  VLAN:
    description: Virtual LAN
    fields:
      id:
        type: string
        required: true
      vlan_id:
        type: integer
        required: true
        description: "802.1Q VLAN ID (1-4094)"
      name:
        type: string
        required: true
      type:
        type: VLANType
      description:
        type: string
      network_id:
        type: string
        ref: Network
      tagged_ports:
        type: array
        items: string
        description: Port IDs that tag this VLAN
      untagged_ports:
        type: array
        items: string
        description: Port IDs where this VLAN is native
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  DHCPReservation:
    description: Static DHCP reservation
    fields:
      mac_address:
        type: string
        required: true
      ip_address:
        type: string
        required: true
      hostname:
        type: string
      description:
        type: string

  # ---------------------------------------------------------------------------
  # Routing (Decomposed)
  # ---------------------------------------------------------------------------

  RouteTable:
    description: Routing table containing route entries
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      description:
        type: string
      network_id:
        type: string
        ref: Network
        description: "Associated network/VPC"
      is_main:
        type: boolean
        default: false
        description: "Main/default route table for network"
      associated_subnets:
        type: array
        items: string
        description: "Subnet IDs using this route table"
      routes:
        type: array
        items: Route
        description: "Route entries in this table"
      propagated_routes:
        type: array
        items: string
        description: "Route sources with propagation enabled (VGW, TGW)"
      tags:
        type: array
        items: string
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  Route:
    description: Individual route entry in a routing table
    fields:
      id:
        type: string
        required: true
      route_table_id:
        type: string
        ref: RouteTable
        required: true
      destination_cidr:
        type: string
        required: true
        description: "Destination CIDR block (e.g., 0.0.0.0/0, 192.168.1.0/24)"
      destination_ipv6_cidr:
        type: string
        description: "IPv6 destination CIDR"
      target_type:
        type: RouteTargetType
        required: true
      target_id:
        type: string
        description: "ID of target resource (IGW, NAT, ENI, TGW, etc.)"
      state:
        type: RouteState
        default: active
      is_propagated:
        type: boolean
        default: false
        description: "Route learned via propagation (not static)"
      origin:
        type: string
        description: "How route was created (CreateRouteTable, CreateRoute, EnableVgwRoutePropagation)"
      priority:
        type: integer
        description: "Route priority (lower = higher priority)"
      description:
        type: string
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  # ---------------------------------------------------------------------------
  # Network ACL (Stateless Firewall - Decomposed)
  # ---------------------------------------------------------------------------

  NetworkACL:
    description: Network Access Control List (stateless subnet-level firewall)
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      description:
        type: string
      network_id:
        type: string
        ref: Network
        description: "Parent network/VPC"
      is_default:
        type: boolean
        default: false
        description: "Default NACL for VPC"
      associated_subnets:
        type: array
        items: string
        description: "Subnet IDs protected by this NACL"
      entries:
        type: array
        items: NetworkACLEntry
      tags:
        type: array
        items: string
      created_at:
        type: datetime
        required: true
      updated_at:
        type: datetime
        required: true

  NetworkACLEntry:
    description: Individual rule in a Network ACL
    fields:
      id:
        type: string
        required: true
      network_acl_id:
        type: string
        ref: NetworkACL
        required: true
      rule_number:
