# Authentication Credentials

entities:

  Credential:
    description: Authentication mechanism
    properties:
      method:
        type: AuthMethod
        required: true
      isEnabled:
        type: boolean
        default: true
      createdAt:
        type: datetime
      lastUsedAt:
        type: datetime

  PasswordCredential:
    extends: Credential
    description: Username/password auth
    properties:
      passwordHash:
        type: string
        description: Never store plaintext
      salt:
        type: string
      mustChangePassword:
        type: boolean
        default: false

  TokenCredential:
    extends: Credential
    description: API key or bearer token
    properties:
      tokenHash:
        type: string
      prefix:
        type: string
        description: First 8 chars for identification
      expiresAt:
        type: datetime

  OAuthCredential:
    extends: Credential
    description: OAuth 2.0 / OIDC
    properties:
      provider:
        type: string
        required: true
        description: Provider name (google, github, okta)
      subject:
        type: string
        required: true
        description: Subject ID from provider
      email:
        type: string

  MFACredential:
    extends: Credential
    description: Multi-factor authentication
    properties:
      mfaType:
        type: string
        enum: [TOTP, SMS, Email, HardwareKey]
      secret:
        type: string
        description: Encrypted secret
      backupCodes:
        type: string[]

enums:

  AuthMethod:
    values: [Password, OAuth, SAML, APIKey, Certificate, MFA]
