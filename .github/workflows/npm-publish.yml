name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quickview-tool

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Fetch npm token from AWS Parameter Store
        id: get-npm-token
        run: |
          NPM_TOKEN=$(aws ssm get-parameter \
            --name "${{ secrets.AWS_SSM_NPM_TOKEN_PATH }}" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)
          echo "::add-mask::${NPM_TOKEN}"
          echo "npm_token=${NPM_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure npm for @andrewhopper scope
        run: |
          echo "@andrewhopper:registry=https://registry.npmjs.org/" > .npmrc
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ steps.get-npm-token.outputs.npm_token }}

      - name: Publish to npm
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ steps.get-npm-token.outputs.npm_token }}
