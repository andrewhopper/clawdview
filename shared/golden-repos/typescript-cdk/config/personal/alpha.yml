# ===========================================
# Personal Context - Alpha Stage (Early Testing)
# ===========================================

# AWS Account & Region
account: "507745175693"  # Personal AWS account
region: "us-east-1"

# Project Settings
projectName: "my-personal-project"
stackPrefix: "personal"

# ===========================================
# Domain Configuration
# ===========================================
domain:
  rootDomain: "alpha.b.lfg.new"
  subdomain: "api"

# ===========================================
# Notification Configuration
# ===========================================
notifications:
  adminEmail: "andy@example.com"

# ===========================================
# Database Configuration
# ===========================================
database:
  instanceClass: "t3.micro"
  allocatedStorage: 20
  multiAz: false
  deletionProtection: false
  backupRetentionDays: 1

# ===========================================
# Compute Configuration
# ===========================================
compute:
  lambdaMemory: 128
  lambdaTimeout: 15
  taskCpu: 256
  taskMemory: 512
  desiredCount: 1
  minCount: 1
  maxCount: 2

# ===========================================
# Monitoring Configuration
# ===========================================
monitoring:
  enableDashboards: false
  enableTracing: true
  logRetentionDays: 1
  alarmEvaluationPeriods: 1

# ===========================================
# Resource Tags
# ===========================================
tags:
  Owner: "Andy"
  Context: "personal"
  Purpose: "Alpha Testing"
