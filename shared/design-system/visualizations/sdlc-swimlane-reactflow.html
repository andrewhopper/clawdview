  <style>
    :root {

<body>
  <header>
    <h1>SDLC Swimlane Diagram</h1>
    <p class="subtitle">Interactive React Flow Version - Agent & Human Handoffs</p>
  </header>

  <div class="controls">
    <button id="fit-view">Fit View</button>
    <button id="reset-zoom">Reset Zoom</button>
    <span style="color: hsl(var(--muted-foreground)); font-size: 0.875rem;">
      Scroll to zoom • Drag to pan • Click nodes for details
    </span>
  </div>

  <div id="root"></div>

  <div class="legend">
    <h2>Legend</h2>
    <div class="legend-grid">
      <div class="legend-item">
        <div class="legend-color" style="background-color: hsl(217 91% 60%);"></div>
        <span class="legend-text">Human (Approvals)</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background-color: hsl(142.1 76.2% 36.3%);"></div>
        <span class="legend-text">Main Claude Agent</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background-color: hsl(262 83% 58%);"></div>
        <span class="legend-text">Domain Modeling Agent</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background-color: hsl(31 97% 72%);"></div>
        <span class="legend-text">Info Architecture Agent</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background-color: hsl(280 100% 70%);"></div>
        <span class="legend-text">UX Composition Agent</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background-color: hsl(173 80% 40%);"></div>
        <span class="legend-text">Infrastructure/SRE Agent</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background-color: hsl(24 95% 53%);"></div>
        <span class="legend-text">Amplify Deploy Agent</span>
      </div>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;
    const { ReactFlow, Background, Controls, MiniMap, useReactFlow, ReactFlowProvider, MarkerType } = ReactFlowLib;

    // Swimlane definitions
    const swimlanes = [
      { id: 'human', label: 'Human', color: '217 91% 60%', yOffset: 0 },
      { id: 'main', label: 'Main Claude Agent', color: '142.1 76.2% 36.3%', yOffset: 150 },
      { id: 'domain', label: 'Domain Modeling Agent', color: '262 83% 58%', yOffset: 300 },
      { id: 'ia', label: 'Info Architecture Agent', color: '31 97% 72%', yOffset: 450 },
      { id: 'ux', label: 'UX Composition Agent', color: '280 100% 70%', yOffset: 600 },
      { id: 'infra', label: 'Infrastructure/SRE Agent', color: '173 80% 40%', yOffset: 750 },
      { id: 'amplify', label: 'Amplify Deploy Agent', color: '24 95% 53%', yOffset: 900 }
    ];

    // Phase definitions with swimlane assignments
    const phases = [
      { id: '1', number: '1.0', name: 'SEED', swimlane: 'main', description: 'Capture idea', xOffset: 0 },
      { id: '2', number: '2.0', name: 'RESEARCH', swimlane: 'main', description: 'Persona & intent', xOffset: 200 },
      { id: '2.5', number: '2.5', name: 'FEASIBILITY', swimlane: 'main', description: 'Go/no-go (prod only)', xOffset: 400 },
      { id: '3', number: '3.0', name: 'EXPANSION', swimlane: 'main', description: 'Explore solutions', xOffset: 600 },
      { id: '4', number: '4.0', name: 'ANALYSIS', swimlane: 'main', description: 'Compare options', xOffset: 800 },
      { id: '5', number: '5.0', name: 'SELECTION', swimlane: 'main', description: 'Choose approach', xOffset: 1000 },
      { id: '5.5', number: '5.5', name: 'PRD', swimlane: 'main', description: 'Requirements (prod only)', xOffset: 1200 },
      { id: '6.1', number: '6.1', name: 'Domain Models', swimlane: 'domain', description: 'Define data structures', xOffset: 1400 },
      { id: '6.2', number: '6.2', name: 'Info Arch', swimlane: 'ia', description: 'Navigation & flows', xOffset: 1600 },
      { id: '6.3', number: '6.3', name: 'UX Design', swimlane: 'ux', description: 'Mockups & components', xOffset: 1800 },
      { id: '7', number: '7.0', name: 'TEST', swimlane: 'main', description: 'Write tests first', xOffset: 2000 },
      { id: '8.1', number: '8.1', name: 'Code', swimlane: 'main', description: 'Write implementation', xOffset: 2200 },
      { id: '8.2', number: '8.2', name: 'Infrastructure', swimlane: 'infra', description: 'CDK/Terraform', xOffset: 2400 },
      { id: '8.3', number: '8.3', name: 'Deploy', swimlane: 'amplify', description: 'Amplify/publish', xOffset: 2600 },
      { id: '9', number: '9.0', name: 'REFINE', swimlane: 'main', description: 'Polish & iterate', xOffset: 2800 }
    ];

    // Create nodes
    const initialNodes = phases.map(phase => {
      const swimlane = swimlanes.find(s => s.id === phase.swimlane);
      return {
        id: phase.id,
        type: 'phase',
        position: { x: phase.xOffset, y: swimlane.yOffset },
        data: {
          label: phase.name,
          number: phase.number,
          description: phase.description,
          color: swimlane.color
        },
        style: {
          backgroundColor: `hsl(${swimlane.color})`,
          borderColor: `hsl(${swimlane.color})`,
          color: 'hsl(0 0% 98%)'
        }
      };
    });

    // Define edges (handoffs)
    const initialEdges = [
      // Phase 2: Persona confirmation
      { source: '2', target: '2', sourceHandle: 'human-confirm', targetHandle: 'human-confirm', label: 'Confirm persona', type: 'approval' },

      // Phase 2.5: Go/no-go gate
      { source: '2.5', target: '2.5', label: 'Go/no-go', type: 'gate' },

      // Phase 5: Tech stack approval
      { source: '5', target: '5', label: 'Approve tech stack', type: 'gate' },

      // Phase 5.5: PRD approval
      { source: '5.5', target: '5.5', label: 'Approve PRD', type: 'gate' },

      // Phase 6: Design sub-phases
      { source: '5.5', target: '6.1', label: 'Need data models', type: 'delegation' },
      { source: '6.1', target: '6.1', label: 'Approve domain', type: 'approval' },
      { source: '6.1', target: '6.2', label: 'Models ready', type: 'handoff' },
      { source: '6.2', target: '6.3', label: 'IA spec', type: 'handoff' },
      { source: '6.3', target: '7', label: 'Design complete', type: 'return' },

      // Phase 8: Implementation sub-phases
      { source: '7', target: '8.1', label: 'Begin coding', type: 'flow' },
      { source: '8.1', target: '8.2', label: 'Need infra', type: 'delegation' },
      { source: '8.2', target: '8.3', label: 'Infra ready', type: 'handoff' },
      { source: '8.3', target: '9', label: 'Deployed', type: 'return' },

      // Phase 9: Final approval
      { source: '9', target: '9', label: 'Review & approve', type: 'approval' }
    ].map((edge, idx) => {
      let color = '240 5% 64.9%'; // muted
      let strokeDasharray = undefined;

      if (edge.type === 'gate' || edge.type === 'approval') {
        color = '0 62.8% 30.6%'; // destructive
      } else if (edge.type === 'delegation') {
        color = '142.1 76.2% 36.3%'; // primary
      } else if (edge.type === 'return') {
        color = '142.1 76.2% 36.3%'; // primary
        strokeDasharray = '5 5';
      }

      return {
        id: `edge-${idx}`,
        source: edge.source,
        target: edge.target,
        label: edge.label,
        type: 'smoothstep',
        animated: edge.type === 'delegation',
        style: {
          stroke: `hsl(${color})`,
          strokeWidth: 2,
          strokeDasharray
        },
        markerEnd: {
          type: MarkerType.ArrowClosed,
          color: `hsl(${color})`
        }
      };
    });

    // Custom node component
    const PhaseNode = ({ data }) => (
      <div>
        <span className="phase-number">{data.number}</span>
        <span className="phase-name">{data.label}</span>
      </div>
    );

    const nodeTypes = {
      phase: PhaseNode
    };

    function FlowCanvas() {
      const reactFlowInstance = useReactFlow();
      const [nodes] = useState(initialNodes);
      const [edges] = useState(initialEdges);

      useEffect(() => {
        setTimeout(() => {
          reactFlowInstance.fitView({ padding: 0.1, duration: 800 });
        }, 100);
      }, [reactFlowInstance]);

      const onNodeClick = useCallback((event, node) => {
        alert(`${node.data.number} - ${node.data.label}\n\n${node.data.description}`);
      }, []);

      return (
        <ReactFlow
          nodes={nodes}
          edges={edges}
          nodeTypes={nodeTypes}
          onNodeClick={onNodeClick}
          fitView
          minZoom={0.2}
          maxZoom={1.5}
          defaultViewport={{ x: 0, y: 0, zoom: 0.5 }}
        >
          <Background color="hsl(240 3.7% 15.9%)" gap={16} />
          <Controls />
          <MiniMap
            nodeColor={(node) => `hsl(${node.data.color})`}
            maskColor="rgba(0, 0, 0, 0.2)"
          />
        </ReactFlow>
      );
    }

    function App() {
      const reactFlowWrapper = useRef(null);

      return (
        <ReactFlowProvider>
          <div ref={reactFlowWrapper} style={{ width: '100%', height: '100%' }}>
            <FlowCanvas />
          </div>
        </ReactFlowProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // Button handlers
    document.getElementById('fit-view').addEventListener('click', () => {
      const instance = window.reactFlowInstance;
      if (instance) instance.fitView({ padding: 0.1, duration: 800 });
    });

    document.getElementById('reset-zoom').addEventListener('click', () => {
      const instance = window.reactFlowInstance;
      if (instance) instance.setViewport({ x: 0, y: 0, zoom: 0.5 }, { duration: 800 });
    });
  </script>
</body>
</html>
