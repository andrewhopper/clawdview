# Fly.io Configuration
# Copy to project root as fly.toml

app = "my-app"
primary_region = "iad"

[build]
  # Use Dockerfile in project root
  dockerfile = "Dockerfile"
  # Or specify build args
  # [build.args]
  #   NODE_ENV = "production"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Uncomment for Postgres
# [[services]]
#   protocol = "tcp"
#   internal_port = 5432
#   [[services.ports]]
#     port = 5432

# Uncomment for mounted volumes
# [mounts]
#   source = "data"
#   destination = "/data"
