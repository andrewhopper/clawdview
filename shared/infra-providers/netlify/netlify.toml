# Netlify Configuration
# Copy to project root as netlify.toml

[build]
  command = "npm run build"
  publish = "dist"
  # functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Development server
[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 5173
  autoLaunch = false

# SPA routing - redirect all paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy example (uncomment if needed)
# [[redirects]]
#   from = "/api/*"
#   to = "https://api.example.com/:splat"
#   status = 200
#   force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Functions configuration (uncomment if using functions)
# [functions]
#   directory = "netlify/functions"
#   node_bundler = "esbuild"
