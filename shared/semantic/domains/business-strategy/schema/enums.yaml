  # Validation & Experimentation Toolkit Enums
  TestCardStatus:
    values:
      - Draft
      - Ready
      - In_Progress
      - Completed
      - Cancelled

  TestCost:
    description: Relative cost/investment required for the test
    values:
      - Very_Low      # < $100, hours
      - Low           # $100-1K, days
      - Medium        # $1K-10K, weeks
      - High          # $10K-100K, months
      - Very_High     # > $100K, quarters

  TestStrength:
    description: How strong the evidence from this test type is
    values:
      - Weak          # Opinions, stated preferences
      - Medium        # Behavioral signals, intent
      - Strong        # Actual behavior, transactions

  DataReliability:
    description: How reliable/trustworthy the data is
    values:
      - Low           # Self-reported, small sample
      - Medium        # Larger sample, some bias
      - High          # Large sample, controlled, actual behavior

  ConfidenceLevel:
    values:
      - Very_Low      # 0-20%
      - Low           # 20-40%
      - Medium        # 40-60%
      - High          # 60-80%
      - Very_High     # 80-100%

  ValidationStage:
    description: Stages in the validation board pipeline
    values:
      - Backlog
      - Testing
      - Validated
      - Invalidated

  HypothesisCategoryBMC:
    description: BMC building block the hypothesis relates to
    values:
      - Desirability_Customer_Segment
      - Desirability_Value_Proposition
      - Desirability_Channels
      - Desirability_Customer_Relationships
      - Viability_Revenue_Streams
      - Viability_Cost_Structure
      - Feasibility_Key_Resources
      - Feasibility_Key_Activities
      - Feasibility_Key_Partners

  HypothesisImportance:
    values:
      - Critical      # Business fails without this
      - Important     # Significant impact
      - Nice_To_Have  # Would be good to validate

  BoardHypothesisStatus:
    values:
      - Active
      - Validated
      - Invalidated
      - Pivoted
      - Parked

  ExperimentType:
