  # ============================================
  # MARKET ANALYSIS ENUMS
  # ============================================

  MarketSizingMethodology:
    values:
      - Top_Down          # Start with total market, narrow down
      - Bottom_Up         # Build from unit economics
      - Value_Theory      # Based on value delivered
      - Comparable        # Based on similar markets

  TrendImpact:
    values:
      - Positive_Major    # Strong tailwind
      - Positive_Minor    # Slight tailwind
      - Neutral           # No significant impact
      - Negative_Minor    # Slight headwind
      - Negative_Major    # Strong headwind

  TrendTimeframe:
    values:
      - Immediate         # 0-6 months
      - Short_Term        # 6-18 months
      - Medium_Term       # 18 months - 3 years
      - Long_Term         # 3+ years

  MarketConcentration:
    values:
      - Fragmented        # Many small players
      - Moderate          # Mix of sizes
      - Concentrated      # Few large players
      - Monopoly          # Single dominant player

  CompetitiveIntensity:
    values: [Low, Moderate, High, Intense]

  CompetitorType:
    values:
      - Direct            # Same solution, same customer
      - Indirect          # Different solution, same problem
      - Potential         # Could enter market
      - Substitute        # Alternative approach

  ThreatLevel:
    values: [Low, Medium, High, Critical]

  SwitchingCost:
    values:
      - None              # Easy to switch
      - Low               # Minor inconvenience
      - Medium            # Some effort required
      - High              # Significant effort
      - Very_High         # Major migration required

  ForceRating:
    description: Porter's Five Forces rating
    values:
      - Very_Low
      - Low
      - Moderate
      - High
      - Very_High

  RegulatoryImpact:
    values:
      - Blocker           # Cannot operate without compliance
      - Major             # Significant compliance cost
      - Minor             # Some compliance needed
      - None              # No regulatory impact

  BarrierType:
    values:
      - Capital           # High capital requirements
      - Technical         # Technical expertise needed
      - Regulatory        # Regulatory hurdles
      - Network_Effects   # Incumbent network advantages
      - Brand             # Brand recognition needed
      - Switching_Costs   # Customer lock-in
      - Distribution      # Access to channels
      - IP                # Patents/trade secrets

  BarrierSeverity:
    values: [Low, Medium, High, Prohibitive]

  BuyingRole:
    values:
