  #     - Inactive
  #     - Pending

# =============================================================================
# ACTIONS
# =============================================================================

actions:

  Entity1Action:
    type: create
    description: "Create a new Entity1"
    operatesOn: Entity1
    params:
      name:
        type: string
        required: true
    returns: Entity1
