domain:
  name: DOMAIN_NAME
  version: "0.1.0"
  description: "DOMAIN_DESCRIPTION"
  namespace: "https://protoflow.ai/ontology/DOMAIN_NAME#"
  created_at: "YYYY-MM-DD"
  updated_at: "YYYY-MM-DD"
  dependencies:
    core: "^1.0.0"

  # Version history
  changelog:
    "0.1.0": "Initial development version"

# =============================================================================
# ENTITIES
# =============================================================================

entities:

  Entity1:
    description: "Description of Entity1"
    extends: core.Entity
    properties:
      id:
        type: string
        required: true
        description: "Unique identifier"
      name:
        type: string
        required: true
        maxLength: 255
        description: "Display name"
      created_at:
        type: datetime
        required: true
        description: "Creation timestamp"
      updated_at:
        type: datetime
        required: true
        description: "Last update timestamp"

