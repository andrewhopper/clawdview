# enums.yaml - Claim/Evidence Domain Enumerations
# Generated: 2025-11-25
# Status: PENDING APPROVAL

enums:
  ClaimType:
    description: "Category of claim or assertion"
    values:
      - fact              # Objective, verifiable statement
      - opinion           # Subjective viewpoint or judgment
      - hypothesis        # Proposed explanation requiring testing
      - prediction        # Statement about future events
      - inference         # Conclusion drawn from evidence
      - definition        # Explanation of term or concept
      - statistical       # Claim based on statistical data
      - causal            # Claim about cause-effect relationship

  ClaimStatus:
    description: "Verification status of claim"
    values:
      - draft             # Initial capture, not reviewed
      - pending_review    # Awaiting verification
      - under_review      # Currently being verified
      - verified          # Confirmed as accurate
      - refuted           # Proven false/incorrect
      - partially_true    # Contains both true and false elements
      - uncertain         # Cannot be verified with available evidence
      - outdated          # Was true but no longer current
      - disputed          # Conflicting evidence or expert opinions

  EvidenceType:
    description: "Category of evidence"
    values:
      - citation          # Reference to published source
      - data              # Raw data or statistics
      - observation       # Direct observation or measurement
      - testimony         # Personal account or witness statement
      - expert_opinion    # Professional expert assessment
      - document          # Official document or record
      - experiment        # Results from controlled experiment
      - survey            # Survey or poll results
      - image             # Photo or visual evidence
      - video             # Video recording
      - audio             # Audio recording
      - metadata          # Technical metadata or logs

  EvidenceRelationship:
    description: "How evidence relates to a claim"
    values:
      - supports          # Evidence backs up the claim
      - refutes           # Evidence contradicts the claim
      - qualifies         # Evidence adds nuance or conditions
      - contextualizes    # Evidence provides background context
      - neutral           # Evidence is relevant but neither supports nor refutes

  ConfidenceLevel:
    description: "Categorical confidence rating"
    values:
      - very_high         # 0.90-1.00: Extremely confident
      - high              # 0.75-0.89: Highly confident
      - medium            # 0.50-0.74: Moderately confident
      - low               # 0.25-0.49: Low confidence
      - very_low          # 0.00-0.24: Very low confidence

  ScoringMethod:
    description: "Method used to generate confidence score"
    values:
      - ai_model          # Generated by AI/ML model
      - human_expert      # Assessed by human expert
      - automated         # Algorithmic calculation
      - consensus         # Aggregated from multiple sources
      - hybrid            # Combination of methods
      - self_reported     # Reported by claim author

  ScoredEntityType:
    description: "Type of entity receiving a confidence score"
    values:
      - claim             # Scoring a claim
      - evidence          # Scoring evidence quality
      - link              # Scoring claim-evidence relationship

  SourceType:
    description: "Category of information source"
    values:
      - academic_paper    # Peer-reviewed academic publication
      - book              # Published book
      - news_article      # News media article
      - website           # Web page or online content
      - government_doc    # Official government document
      - legal_document    # Legal filing or court document
      - database          # Structured database
      - api               # Data from API
      - social_media      # Social media post
      - interview         # Interview or conversation
      - personal_comm     # Personal communication
      - internal_doc      # Internal organizational document
      - ai_extraction     # Extracted by AI system
      - manual_entry      # Manually entered by human

  ClaimRelationshipType:
    description: "How claims relate to each other"
    values:
      - supports          # One claim supports another
      - contradicts       # One claim contradicts another
      - refines           # One claim refines/clarifies another
      - generalizes       # Broader version of another claim
      - specializes       # More specific version of another claim
      - assumes           # One claim assumes another as premise
      - implies           # One claim logically implies another
      - context_for       # Provides context for another claim

  DecayFunction:
    description: "Mathematical function for temporal relevance decay"
    values:
      - none              # No decay, relevance stays constant
      - linear            # Linear decay: R(t) = base - (decay_rate * days_elapsed)
      - exponential       # Exponential decay: R(t) = base * (0.5)^(days_elapsed / half_life)
      - logarithmic       # Logarithmic decay: R(t) = base - (decay_rate * log(1 + days_elapsed))
      - step              # Step function: drop by step_size every step_threshold_days
      - sigmoid           # Sigmoid decay: smooth S-curve transition
      - custom            # Custom decay function defined in custom_parameters
