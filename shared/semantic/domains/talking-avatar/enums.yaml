      - top_right
      - center_left
      - center
      - center_right
      - bottom_left
      - bottom_center
      - bottom_right
    description: "Avatar placement in frame"

  AvatarSize:
    values:
      - small              # Small overlay
      - medium             # Standard presenter
      - large              # Prominent presence
      - fullscreen         # Fill entire frame
    description: "Avatar size in scene"

  VoiceProvider:
    values:
      - heygen
      - elevenlabs
      - aws_polly
      - openai_tts
      - azure_tts
      - google_tts
      - d_id
      - synthesia
