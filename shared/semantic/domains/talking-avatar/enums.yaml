      - casual             # Home, relaxed
      - outdoor            # Nature, urban
      - studio             # Clean studio background
      - greenscreen        # Chroma key for custom background
      - custom             # User-uploaded scene
    description: "Scene/template category"

  BackgroundType:
    values:
      - solid_color        # Single color background
      - gradient           # Color gradient
      - image              # Static image
      - video              # Video background
      - greenscreen        # Green screen for compositing
      - blur               # Blurred background
    description: "Type of background in scene"

  TrainingStatus:
    values:
      - uploading          # Photos being uploaded
      - validating         # Checking photo quality
      - queued             # Waiting for training
      - training           # Model training in progress
      - processing         # Post-processing avatar
      - completed          # Avatar ready to use
      - failed             # Training failed
      - cancelled          # User cancelled
    description: "Custom avatar training job status"

  StreamingStatus:
    values:
      - initializing       # Setting up session
      - connecting         # Establishing WebRTC connection
      - active             # Session running
      - paused             # Temporarily paused
      - ended              # Session ended normally
      - disconnected       # Connection lost
      - failed             # Session failed
    description: "Streaming session status"

  StreamingQuality:
    values:
      - low                # Lower bandwidth/quality
      - medium             # Balanced quality
      - high               # High quality stream
      - auto               # Adaptive quality
    description: "Streaming video quality"

  StreamingMessageType:
    values:
