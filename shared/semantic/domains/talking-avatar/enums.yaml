    values:
      - talking_photo       # Photo-based avatar (D-ID, HeyGen Photo Avatar)
      - cgi_avatar          # CGI character (Synthesia, HeyGen stock)
      - custom              # User-trained custom avatar
      - instant             # Instant avatar (single photo, no training)
    description: "Type of avatar generation method"

  AvatarProvider:
    values:
      - heygen
      - d_id
