      - sad
      - surprised
      - angry
      - disgusted
      - fearful
      - excited
      - confident
      - thoughtful
      - friendly
      - serious
    description: "Avatar facial expression/emotion"

  AvatarPose:
    values:
      - standing
      - sitting
      - closeup            # Headshot
      - medium_shot        # Waist up
      - full_body
      - profile            # Side view
      - three_quarter      # Angled view
    description: "Avatar body positioning"

  LipSyncQuality:
    values:
      - standard           # Basic lip sync
      - enhanced           # Improved accuracy
      - precise            # Maximum precision
    description: "Lip synchronization quality level"
