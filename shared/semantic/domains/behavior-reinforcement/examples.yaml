  # ---------------------------------------------------------------------------
  # EXAMPLE 2: Model-Specific Client Names
  # ---------------------------------------------------------------------------
  - id: "NICE-20251209-0002"
    signal: positive
    category: accuracy
    title: "Match BAML client names to model config"

    pattern: |
      When config.yaml specifies a model (e.g., qwen3:8b), name the BAML
      client to match:

      # If config says model: qwen3:8b
      client<llm> QwenClient {  # Name reflects the model
        provider ollama
        options {
          model "qwen3:8b"
        }
      }

    anti_pattern: |
      # WRONG - generic name doesn't match model
      client<llm> OllamaClient {  # Vague, doesn't indicate which model
        provider ollama
        options {
          model "llama3.2:3b"  # Also outdated if config says qwen3:8b
        }
      }

    trigger_context: "Creating BAML clients for LLM integration"

    examples:
      - situation: "config.yaml has ollama.model: qwen3:8b"
        correct_behavior: "Create QwenClient with model qwen3:8b"
        incorrect_behavior: "Create OllamaClient with model llama3.2:3b"
        source_session_id: "56ee5a88-32c8-4f63-a6a0-ebd7d429806c"

    tags: [baml, ollama, naming, config-consistency]

    provenance:
      source_type: user_feedback
      session_id: "56ee5a88-32c8-4f63-a6a0-ebd7d429806c"
      file_path: "bin/overwatch/baml_src/workflow_analysis.baml"
      tool_name: "Edit"
      observed_by: "andyhop"
      observed_at: "2025-12-09T09:50:00Z"

    approval:
      status: pending

