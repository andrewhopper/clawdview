  # EXAMPLE 4: Approved Pattern (hypothetical)
  # ---------------------------------------------------------------------------
  - id: "NICE-20251201-0042"
    signal: positive
    category: following_rules
    title: "Use uv instead of pip for Python projects"

    pattern: |
      For Python projects in this monorepo:
      - Use `uv add package` not `pip install package`
      - Use `uv run command` not direct execution
      - Reference: CLAUDE.md section on Python projects

    anti_pattern: |
      pip install httpx  # WRONG
      python script.py   # WRONG

    trigger_context: "Any Python package management"

    examples:
      - situation: "Need to add httpx dependency"
        correct_behavior: "uv add httpx"
        incorrect_behavior: "pip install httpx"

    tags: [python, uv, pip, dependencies, claude-md]

    provenance:
