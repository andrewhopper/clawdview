  # ---------------------------------------------------------------------------
  # EXAMPLE 1: BAML Version Matching (from today's session)
  # ---------------------------------------------------------------------------
  - id: "NICE-20251209-0001"
    signal: positive
    category: tool_usage
    title: "Always use latest BAML version"

    pattern: |
      When working with BAML (BoundaryML):
      1. Check installed version: `npm info @boundaryml/baml version`
      2. Match generators.baml version to installed version
      3. Never hardcode old versions like 0.70.0

    anti_pattern: |
      # WRONG - hardcoded old version
      generator target {
        version "0.70.0"  # Will cause version mismatch error
      }

    # RLHF-compatible pairwise comparison (Anthropic/HuggingFace format)
    chosen: |
      generator target {
        output_type python/pydantic
        output_dir "../baml_client"
        version "0.214.0"  # Matches installed: npm info @boundaryml/baml version
      }

    rejected: |
      generator target {
        output_type python/pydantic
        output_dir "../baml_client"
        version "0.70.0"  # Hardcoded old version - will cause mismatch error
      }

    preference_strength: strong

    trigger_context: "Any BAML schema work, especially after npm install"

    examples:
      - situation: "Setting up BAML for a new project"
        correct_behavior: |
          1. npm info @boundaryml/baml version  # Returns 0.214.0
          2. Set version "0.214.0" in generators.baml
        incorrect_behavior: |
          Copy-paste old generators.baml with version "0.70.0"

    tags: [baml, boundaryml, versioning, setup]

    provenance:
      source_type: self_observation

      project_context:
        project_id: null  # Not in a .project folder
        project_name: "overwatch-pathway-analyzer"
        project_type: poc
