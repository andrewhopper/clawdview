# Tech Stack Domain Model
# Technologies as first-class entities with proper abstractions

domain:
  name: tech-stack
  version: "1.0.0"
  description: Technology registry with rich metadata and proper entity relationships
  owner: platform
  dependencies: [core]
  created_at: "2025-11-30"
  updated_at: "2025-11-30"

entities:

  # ============================================
  # PRIMITIVES (reusable across entities)
  # ============================================

  URL:
    description: Universal Resource Locator with parsed components and metadata
    properties:
      href: { type: string, required: true, description: "Full URL string" }
      protocol: { type: Protocol, description: "http, https, ftp, etc." }
      host: { type: string, description: "Domain or IP address" }
      port: { type: integer, description: "Port number if non-standard" }
      pathname: { type: string, description: "Path after host" }
      search: { type: string, description: "Query string including ?" }
      hash: { type: string, description: "Fragment including #" }
      status: { type: URLStatus, default: active, description: "Is this URL still valid?" }
      verified_at: { type: datetime, description: "Last time URL was checked" }

  Website:
    description: A web presence with URL and metadata
    properties:
      url: { type: URL, required: true }
      label: { type: string, description: "Display name (e.g., 'Main Site', 'Documentation')" }
      type: { type: WebsiteType }

  Email:
    description: An email address with metadata
    properties:
      address: { type: string, required: true, description: "Email address" }
      type: { type: EmailType, description: "Purpose of this email" }
      label: { type: string, description: "Display name" }

  License:
    description: Software license definition
    properties:
      id: { type: string, required: true, description: "SPDX identifier (e.g., MIT, Apache-2.0)" }
      name: { type: string, required: true, description: "Full name" }
      url: { type: url, description: "License text URL" }
      osiApproved: { type: boolean, description: "OSI approved license" }
      permissions: { type: array, items: string, description: "What you CAN do" }
      conditions: { type: array, items: string, description: "What you MUST do" }
      limitations: { type: array, items: string, description: "What you CANNOT do" }

  # ============================================
  # CORE ENTITIES
  # ============================================

  Organization:
    description: Company, foundation, or individual that creates/maintains technologies
    properties:
      id: { type: string, required: true, description: "Unique slug (e.g., meta, vercel)" }
      name: { type: string, required: true }
      type: { type: OrgType, required: true }
      websites: { type: array, items: Website, description: "0 to n websites" }
      github: { type: url, description: "GitHub organization URL" }
      twitter: { type: string }
      emails: { type: array, items: Email }
      description: { type: string }

  Technology:
    description: A framework, library, tool, language, or service
    properties:
      id: { type: string, required: true, description: "Unique slug (e.g., react, fastapi)" }
      name: { type: string, required: true, description: "Display name" }
      description: { type: string }
      category: { type: TechCategory, required: true }
      subcategory: { type: string }

      # Relationships
      created_by: { type: string, required: true, description: "Organization ID" }

      # Source & docs
      repository: { type: Repository }
      websites: { type: array, items: Website, description: "Main site, docs, etc." }

      # Package registries
      packages: { type: array, items: Package }

      # License
      license: { type: string, description: "SPDX license ID reference" }

      # Metadata
      first_release: { type: date }

      # Classification
      tags: { type: array, items: string }
      language: { type: string, description: "Primary implementation language" }
      runtime: { type: Runtime }

      # Detection
      detection_rules: { type: array, items: DetectionRule }

      # Relationships to other technologies
      extends: { type: string, description: "Parent technology ID" }
      related_to: { type: array, items: string }
      alternative_to: { type: array, items: string }

  Repository:
    description: Source code repository
    properties:
      url: { type: url, required: true }
      platform: { type: RepoPlatform, default: github }
      stars: { type: integer }
      last_commit: { type: datetime }

  Package:
    description: Published package on a registry
    properties:
      registry: { type: PackageRegistry, required: true }
      name: { type: string, required: true }
      scope: { type: string, description: "npm scope like @anthropic-ai" }

  DetectionRule:
    description: Rule for auto-detecting a technology in a project
    properties:
      type: { type: DetectorType, required: true }
      pattern: { type: string, required: true }
      confidence: { type: ConfidenceLevel, default: high }

  TechProfile:
    description: Complete technology profile detected for a project
    properties:
      languages: { type: array, items: string }
      frameworks: { type: array, items: string }
      libraries: { type: array, items: string }
      tools: { type: array, items: string }
      services: { type: array, items: string }
      target_outputs: { type: array, items: TargetOutput }

enums:

  Protocol:
    values:
      - http
      - https
      - ftp
      - sftp
      - ssh
      - git
      - mailto
      - file

  URLStatus:
    values:
      - active        # URL is live and working
      - deprecated    # URL works but will be removed
      - redirect      # URL redirects to another
      - archived      # URL is archived (e.g., on Wayback Machine)
      - broken        # URL returns 4xx/5xx
      - unknown       # Status not yet checked

  OrgType:
    values:
      - company
      - foundation
      - individual
      - community

  WebsiteType:
    values:
      - main           # Primary website
      - documentation  # Docs site
      - blog           # Blog
      - api            # API reference
      - changelog      # Release notes / changelog
      - community      # Forum, Discord, etc.
      - support        # Support / help

  EmailType:
    values:
      - general
      - support
      - security
      - sales

  TechCategory:
    values:
      - language
      - framework
      - library
      - tool
      - database
      - cloud_service
      - devops

  RepoPlatform:
    values:
      - github
      - gitlab
      - bitbucket

  PackageRegistry:
    values:
      - npm
      - pypi
      - cargo
      - maven
      - nuget
      - rubygems
      - hex

  Runtime:
    values:
      - node
      - deno
      - bun
      - python
      - rust
      - go
      - jvm
      - dotnet
      - ruby
      - elixir
      - browser

  DetectorType:
    values:
      - npm_dependency
      - pypi_dependency
      - cargo_dependency
      - file_exists
      - file_extension
      - file_content
      - config_field

  ConfidenceLevel:
    values:
      - high
      - medium
      - low

  TargetOutput:
    values:
      - cli_tool
      - web_app
      - api
      - dashboard
      - mobile_app
      - desktop_app
      - browser_extension
      - library
      - ui_components
      - mcp_server
      - agent
      - cdk_stack
      - lambda
      - service
      - domain_model
      - documentation
