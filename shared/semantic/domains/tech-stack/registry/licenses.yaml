    url: https://opensource.org/licenses/AGPL-3.0
    osiApproved: true
    permissions: [commercial-use, modification, distribution, patent-use, private-use]
    conditions: [disclose-source, license-notice, network-use-disclose, same-license, state-changes]
    limitations: [liability, warranty]

  Unlicense:
    name: The Unlicense
    url: https://unlicense.org
    osiApproved: true
    permissions: [commercial-use, modification, distribution, private-use]
    conditions: []
    limitations: [liability, warranty]

  CC0-1.0:
    name: Creative Commons Zero v1.0 Universal
    url: https://creativecommons.org/publicdomain/zero/1.0/
    osiApproved: false
    permissions: [commercial-use, modification, distribution, private-use]
    conditions: []
    limitations: [liability, warranty, patent-use, trademark-use]

  PostgreSQL:
    name: PostgreSQL License
    url: https://www.postgresql.org/about/licence/
    osiApproved: true
    permissions: [commercial-use, modification, distribution, private-use]
    conditions: [license-notice]
    limitations: [liability, warranty]

  SSPL-1.0:
    name: Server Side Public License v1
    url: https://www.mongodb.com/licensing/server-side-public-license
    osiApproved: false
    permissions: [commercial-use, modification, distribution, private-use]
    conditions: [disclose-source, license-notice, same-license, network-use-disclose]
    limitations: [liability, warranty]

  BSL-1.1:
    name: Business Source License 1.1
    url: https://mariadb.com/bsl11/
    osiApproved: false
    permissions: [modification, private-use]
    conditions: [license-notice, time-limited-commercial]
    limitations: [commercial-use-limited, liability, warranty]

  # Public Domain
  public-domain:
    name: Public Domain
    url: null
    osiApproved: false
    permissions: [commercial-use, modification, distribution, private-use]
    conditions: []
    limitations: []
