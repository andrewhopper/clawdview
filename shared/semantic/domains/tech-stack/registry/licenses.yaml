# Software Licenses Registry
# Based on SPDX License List: https://spdx.org/licenses/

licenses:

  MIT:
    name: MIT License
    url: https://opensource.org/licenses/MIT
    osiApproved: true
    permissions: [commercial-use, modification, distribution, private-use]
    conditions: [license-notice]
    limitations: [liability, warranty]

  Apache-2.0:
    name: Apache License 2.0
    url: https://opensource.org/licenses/Apache-2.0
    osiApproved: true
    permissions: [commercial-use, modification, distribution, patent-use, private-use]
    conditions: [license-notice, state-changes]
    limitations: [liability, warranty, trademark-use]

  GPL-2.0:
    name: GNU General Public License v2.0
    url: https://opensource.org/licenses/GPL-2.0
    osiApproved: true
    permissions: [commercial-use, modification, distribution, private-use]
    conditions: [disclose-source, license-notice, same-license]
    limitations: [liability, warranty]

  GPL-3.0:
