# Intent Domain Model
# Human intentions, behaviors, and context
# The breakthrough: Define software as human behavior patterns

domain:
  name: intent
  version: "1.0.0"
  description: Human intents, behavior patterns, context, and jobs-to-be-done
  dependencies: [core, action]
  philosophy: Software exists to fulfill human intentions, not just execute functions
  created_at: "2025-11-21"
  updated_at: "2025-11-22"

entities:

  HumanIntent:
    description: What a human wants to accomplish, independent of implementation
    properties:
      id: { type: string, required: true }
      name: { type: string, required: true }
      goal: { type: string, required: true, description: "The desired outcome" }
      trigger: { type: string, description: "What prompts this intent" }
      implementations: { type: array, items: string, description: "Technical actions that can fulfill this intent" }
      choosesAction: { type: string, description: "Logic for choosing between implementation options" }
      requiredContext: { type: array, items: string, description: "Context required for this intent to be relevant" }
      createdAt: { type: datetime, required: true }
      updatedAt: { type: datetime, required: true }

  BehaviorPattern:
    description: Recurring pattern of human behavior (routine, workflow, habit)
    properties:
      id: { type: string, required: true }
      name: { type: string, required: true }
      trigger: { type: string, description: "What initiates this behavior pattern" }
      steps: { type: array, items: string, description: "Sequence of intent names" }
      duration: { type: duration, description: "Typical time this behavior takes" }
      adaptsTo: { type: array, items: string, description: "Contextual factors this behavior adapts to" }
      completionCriteria: { type: string, description: "How to know this behavior is complete" }
      createdAt: { type: datetime, required: true }
      updatedAt: { type: datetime, required: true }

  Context:
    description: Situational factors that influence intent and behavior
    properties:
      id: { type: string, required: true }
      name: { type: string, required: true }
      when: { type: string, description: "When this context applies" }
      enables: { type: array, items: string, description: "Intents appropriate in this context" }
      disables: { type: array, items: string, description: "Intents to block in this context" }
      automates: { type: array, items: string, description: "Actions auto-executed when entering context" }
      reminderMessage: { type: string, description: "Message if user violates context rules" }
      createdAt: { type: datetime, required: true }
      updatedAt: { type: datetime, required: true }

  JobToBeDone:
    description: High-level job user hires software to accomplish
    properties:
      id: { type: string, required: true }
      name: { type: string, required: true }
      when: { type: string, description: "Situation triggering this job" }
      want: { type: string, description: "What user wants to achieve" }
      outcome: { type: string, description: "Desired emotional/functional outcome" }
      frustrations: { type: array, items: string, description: "Current frustrations with existing solutions" }
      hiresSoftwareFor: { type: array, items: string, description: "Specific intents software should support" }
      createdAt: { type: datetime, required: true }
      updatedAt: { type: datetime, required: true }

  UserPreference:
    description: Learned preferences for how user wants intents fulfilled
    properties:
      id: { type: string, required: true }
      userId: { type: string, required: true }
      forIntent: { type: string, required: true }
      forRelationship: { type: string, description: "Specific person or context" }
      preferredTime: { type: time }
      preferredMethod: { type: string, description: "User's preferred implementation method" }
      adaptationHistory: { type: string, description: "History of user's choices to learn from" }
      createdAt: { type: datetime, required: true }
      updatedAt: { type: datetime, required: true }

  ConditionalAction:
    description: Action that executes based on context conditions
    properties:
      id: { type: string, required: true }
      condition: { type: string, required: true }
      action: { type: string, required: true }
      priority: { type: integer, default: 0 }

# Example Intents (as reference data)
example_intents:

  StayInTouch:
    goal: Maintain meaningful connection with someone
    trigger: Days since last contact exceeds relationship frequency preference
    implementations: [SendEmail, MakePhoneCall, SendMessage, ScheduleVisit]
    choosesAction: |
      Priority order based on context:
      1. PhoneCall IF has_time AND good_signal AND relationship_closeness > 0.7
      2. VideoCall IF both_available AND quality_matters
      3. Email IF need_to_share_details OR long_form
      4. TextMessage IF just_checking_in OR quick_update
    requiredContext: [NotInMeeting, RecipientAwake]

  RememberSomething:
    goal: Don't forget task or commitment
    trigger: Task created or commitment made
    implementations: [CreateTask, CreateEvent, CreateNote, SetReminder]
    choosesAction: |
      Based on type:
      - Appointment/meeting → CreateEvent
      - Action item → CreateTask
      - Information → CreateNote
      - Simple reminder → SetReminder

  GetProductiveWork:
    goal: Accomplish focused, deep work
    trigger: Calendar shows focus block OR user requests focus time
    implementations: [BlockTime, PauseNotifications, EnableDND, PlayFocusPlaylist]
    choosesAction: Execute all in parallel to create distraction-free environment
    requiredContext: [HasTimeBlock, NotInMeeting]

  FeelAccomplished:
    goal: Sense of progress and achievement
    trigger: End of day OR end of week OR milestone reached
    implementations: [ReflectOnDay, ReviewCompleted, ShowProgress]
    choosesAction: Show wins, not just remaining tasks

  AvoidDistraction:
    goal: Stay focused on current priority
    trigger: In focus time OR working on important task
    implementations: [BlockSites, EnableDND, HideNotifications]
    choosesAction: Block based on distraction_history
    requiredContext: [FocusTime]

# Example Behaviors (as reference data)
example_behaviors:

  MorningRoutine:
    trigger: User wakes up
    duration: PT30M
    steps: [CheckWeather, ReviewCalendar, TriageEmail, PlanDay]
    adaptsTo: [TimeAvailable, DayOfWeek]
    completionCriteria: "Day plan created AND email inbox < 10"

  EndOfDay:
    trigger: "Work day ending (5pm OR calendar clear)"
    duration: PT15M
    steps: [ReviewAccomplishments, CaptureOpenLoops, PrepareForTomorrow, Disconnect]
    completionCriteria: "All tasks captured AND tomorrow prepared"

  EmailProcessing:
    trigger: "Unprocessed emails > threshold"
    steps: [ReadEmail, DecideAction, ExecuteAction, MoveToNext]
    adaptsTo: [AvailableTime, EmailCount]
    completionCriteria: "Inbox count = 0"

  WeeklyReview:
    trigger: "Friday afternoon OR Sunday evening"
    duration: PT60M
    steps: [ReviewWeek, CelebrateWins, CaptureInsights, PlanNextWeek]
    completionCriteria: "Next week planned AND insights captured"

  DeepWorkSession:
    trigger: Calendar focus block
    duration: PT90M
    steps: [GetProductiveWork, AvoidDistraction, MaintainFocus]
    adaptsTo: [EnergyLevel, TaskComplexity]
    completionCriteria: "Focus time completed OR significant progress made"

# Example Contexts (as reference data)
example_contexts:

  WorkingHours:
    when: "Monday-Friday 9am-5pm"
    enables: [GetProductiveWork, CollaborateWithTeam, AttendMeeting]
    disables: [PersonalErrand, SocialBrowsing]

  FocusTime:
    when: "Calendar shows Deep Work block"
    enables: [GetProductiveWork, ResearchTopic]
    disables: [CheckEmail, CheckSlack, BrowseSocial]
    automates: [PauseNotifications, EnableDND, SetStatus]
    reminderMessage: "You're in focus time. Is this urgent?"

  WithFamily:
    when: "Evening OR weekend, at home location"
    enables: [PlayWithKids, CookDinner, QualityTime]
    disables: [CheckWorkEmail, TakeWorkCall]
    reminderMessage: "You chose family time. Can work wait?"

  Commuting:
    when: "GPS moving, car connected"
    enables: [ListenToPodcast, ReflectOnDay, PlanDay]
    disables: [WriteEmail, ReadDocument]
    automates: [EnableDriveMode]

  LowEnergy:
    when: "Time of day OR biometric indicators"
    enables: [TakeBreak, LightTasks, AdminWork]
    disables: [CreativeWork, ImportantDecisions]
    reminderMessage: "Your energy is low. Save complex work for later?"

  HighEnergy:
    when: "Morning OR after exercise"
    enables: [TackleHardProblem, CreativeWork, ImportantDecisions]
    disables: [BusyWork, AdminWork]
    reminderMessage: "Great energy! Focus on your most important work."

# Example Jobs (as reference data)
example_jobs:

  StayConnectedToLovedOnes:
    when: "Physically distant from family/friends"
    want: "Maintain close emotional connection"
    outcome: "Feel connected, loved ones feel valued"
    frustrations: [ForgetToReachOut, DontKnowWhatToSay, TimeZoneDifferences]
    hiresSoftwareFor: [StayInTouch, RememberBirthday, ShareMoment]

  FeelProductive:
    when: "Want to accomplish meaningful work"
    want: "Make progress on important goals"
    outcome: "Sense of accomplishment, reduced stress"
    frustrations: [TooManyDistractions, UnclearPriorities, InterruptedFocus]
    hiresSoftwareFor: [GetProductiveWork, AvoidDistraction, FeelAccomplished]

  ManageOverwhelm:
    when: "Too much to do, feeling stressed"
    want: "Clarity on what matters, confidence in plan"
    outcome: "Feel in control, reduced anxiety"
    frustrations: [CantRememberEverything, ConflictingPriorities, NoSystem]
    hiresSoftwareFor: [CaptureEverything, PrioritizeTasks, CreatePlan]
